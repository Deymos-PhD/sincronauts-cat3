<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruta CAT3 · pVANE</title>

<style>
:root{
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --blue:#2563eb;
  --blue-dark:#1d4ed8;
  --green:#16a34a;
  --amber:#f59e0b;
  --red:#dc2626;
  --line:#e5e7eb;
  --soft-blue:#eff6ff;
  --soft-green:#ecfdf5;
  --soft-amber:#fffbeb;
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:24px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.app{
  max-width:1320px;
  margin:auto;
  display:grid;
  grid-template-columns:310px minmax(420px,1fr) 300px;
  gap:18px;
  align-items:start;
}

.card{
  background:var(--card);
  border-radius:22px;
  padding:22px;
  box-shadow:0 14px 42px rgba(15,23,42,.08);
}

h1,h2,h3{margin-top:0}
p{line-height:1.45}

button{
  border:0;
  border-radius:12px;
  padding:11px 16px;
  margin:6px 4px;
  background:var(--blue);
  color:white;
  cursor:pointer;
  font-size:14px;
  transition:.16s ease;
}

button:hover{
  background:var(--blue-dark);
  transform:translateY(-1px);
}

button.secondary{
  background:#e5e7eb;
  color:#111827;
}

button.ghost{
  background:#f8fafc;
  color:#1f2937;
  border:1px solid var(--line);
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
}

select{
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:white;
  font:inherit;
}

.small{
  font-size:13px;
  color:var(--muted);
}

.notice{
  background:#fff7ed;
  border:1px solid #fed7aa;
  color:#7c2d12;
  padding:14px;
  border-radius:14px;
  margin:16px 0;
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:var(--soft-blue);
  color:var(--blue);
  font-size:13px;
  font-weight:700;
}

.progress-wrap{
  margin:16px 0;
}

.progress{
  height:14px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
}

.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#2563eb,#16a34a);
  width:0%;
  transition:.3s ease;
}

.identity-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:12px;
  margin-top:16px;
}

.identity-card{
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  background:#fbfdff;
  cursor:pointer;
  transition:.16s ease;
}

.identity-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(15,23,42,.08);
}

.avatar{
  width:72px;
  height:72px;
  margin:4px auto 12px;
  display:block;
}

.identity-row{
  display:grid;
  grid-template-columns:72px 1fr;
  gap:12px;
  align-items:center;
}

.milestones{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:14px;
}

.milestone{
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  background:#fbfdff;
  cursor:pointer;
  transition:.16s ease;
}

.milestone.active{
  border-color:#93c5fd;
  background:#eff6ff;
}

.milestone.locked{
  opacity:.42;
  cursor:not-allowed;
}

.milestone-title{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-weight:800;
  margin-bottom:5px;
}

.stars{
  letter-spacing:1px;
  font-size:18px;
  color:#d97706;
  white-space:nowrap;
}

.levels{
  margin-top:8px;
  font-size:12px;
  color:var(--muted);
}

.chatbox{
  height:460px;
  overflow-y:auto;
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  background:#fbfdff;
  text-align:left;
}

.msg{
  margin:10px 0;
  padding:11px 13px;
  border-radius:14px;
  max-width:94%;
  white-space:pre-wrap;
  line-height:1.38;
}

.user{
  margin-left:auto;
  background:#dbeafe;
}

.vane{
  margin-right:auto;
  background:#f3f4f6;
}

.award{
  margin-right:auto;
  background:#ecfdf5;
  border:1px solid #bbf7d0;
  color:#14532d;
}

.system{
  margin-right:auto;
  background:#fffbeb;
  border:1px solid #fde68a;
  color:#78350f;
}

textarea{
  width:100%;
  height:90px;
  margin-top:12px;
  border-radius:14px;
  border:1px solid var(--line);
  padding:12px;
  resize:none;
  font-family:inherit;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  margin-top:10px;
}

.ptorpedo{
  display:none;
  border:1px solid #bbf7d0;
  background:#f7fef9;
  animation:appear .35s ease both;
}

.ptorpedo.visible{
  display:block;
}

.ptorpedo-section{
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid #d1fae5;
}

.ptorpedo-item{
  font-size:13px;
  margin:7px 0;
  line-height:1.35;
}

.empty{
  color:var(--muted);
  font-size:13px;
}

.report{
  text-align:left;
  white-space:pre-wrap;
  border:1px solid var(--line);
  background:#fbfdff;
  border-radius:16px;
  padding:18px;
}

.tour-overlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.72);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:20;
}

.tour-box{
  width:min(620px,100%);
  background:white;
  border-radius:24px;
  padding:28px;
  box-shadow:0 24px 70px rgba(0,0,0,.25);
}

.tour-step{
  font-size:13px;
  color:var(--muted);
  margin-bottom:8px;
}

@keyframes appear{
  from{opacity:0; transform:translateY(10px) scale(.98)}
  to{opacity:1; transform:translateY(0) scale(1)}
}

@media(max-width:1120px){
  body{padding:16px}
  .app{grid-template-columns:1fr}
  .chatbox{height:380px}
}

@media print{
  body{background:white;padding:0}
  .app{display:block}
  .chat-panel,.actions,button,textarea,.tour-overlay,.identity-tools{display:none!important}
  .card{box-shadow:none;border-radius:0}
  .ptorpedo{display:block!important}
}
</style>
</head>

<body>
<div id="root"></div>

<script>
/* =========================================================
   PRE-PARÁSITO CAT3 · pVANE v1
   - 4 identidades visibles
   - tour post-identidad adaptativo
   - lista vertical de hitos
   - chat pVANE por Netlify Function
   - estrellas por mérito conceptual
   - pTorpedo aparece tras primera estrella
   ========================================================= */

const STORAGE_KEY = "PVANE_CAT3_PRE_PARASITO_V1";
const ENDPOINT = "/.netlify/functions/pvane-evaluate";
const STUDENT_ID_KEY = "PVANE_STUDENT_ID";

const identities = {
  ingeniero:{
    name:"Ingeniero",
    emoji:"🔧",
    color:"#f97316",
    phrase:"VANE usará lenguaje de sistemas, flujo, control y diagnóstico funcional.",
    subtitle:"Tu ruta prioriza entender cómo funcionan y se regulan los sistemas celulares.",
    metaphor:"Piensa cada hito como un sistema que debes diagnosticar y optimizar.",
    opener:"Partamos por el mecanismo: ¿qué proceso celular se cae primero si falta energía utilizable?"
  },
  arqueologo:{
    name:"Arqueólogo",
    emoji:"🏺",
    color:"#92400e",
    phrase:"VANE usará lenguaje de evidencia, capas, huellas y reconstrucción conceptual.",
    subtitle:"Tu ruta prioriza reconstruir evidencias y descubrir relaciones profundas.",
    metaphor:"Piensa cada hito como una capa de información que debes interpretar.",
    opener:"Partamos con la evidencia: ¿qué huella deja una reacción cuando libera o requiere energía?"
  },
  diplomatico:{
    name:"Diplomático",
    emoji:"🤝",
    color:"#0ea5e9",
    phrase:"VANE usará lenguaje de interacción, regulación, comunicación y coordinación.",
    subtitle:"Tu ruta prioriza conectar procesos, señales y relaciones entre partes.",
    metaphor:"Piensa cada hito como una red de interacciones que debes coordinar.",
    opener:"Partamos conectando partes: ¿cómo negocia la célula entre energía disponible y trabajo celular?"
  },
  estratega:{
    name:"Estratega",
    emoji:"🧠",
    color:"#8b5cf6",
    phrase:"VANE usará lenguaje de decisiones, consecuencias, prioridades e integración.",
    subtitle:"Tu ruta prioriza tomar decisiones integrando múltiples variables celulares.",
    metaphor:"Piensa cada hito como un escenario donde debes anticipar consecuencias.",
    opener:"Partamos ordenando prioridades: ¿qué concepto gobierna a los demás en metabolismo celular?"
  }
};

const hitos = {
  cat3_dg:{
    title:"Energía libre (ΔG)",
    oa:"RAA4 · Sistemas, leyes termodinámicas y espontaneidad",
    focus:"Relacionar ΔG, energía libre, espontaneidad y transformación energética celular.",
    prompt:"¿Por qué una reacción con ΔG negativo puede ocurrir espontáneamente en la célula?",
    backend:"cat3_h1_termodinamica"
  },
  cat3_atp:{
    title:"ATP y acoplamiento",
    oa:"RAA4 · ATP, acoplamiento energético y reacciones REDOX",
    focus:"Explicar cómo ATP y transportadores reducidos permiten trabajo celular.",
    prompt:"¿Cómo permite el ATP impulsar reacciones endergónicas?",
    backend:"cat3_h2_atp_redox"
  },
  cat3_enzimas:{
    title:"Enzimas y regulación",
    oa:"RAA4 · Catálisis, energía de activación e inhibición",
    focus:"Explicar cómo las enzimas aceleran reacciones sin modificar ΔG.",
    prompt:"¿Por qué las enzimas aceleran reacciones sin modificar ΔG?",
    backend:"cat3_h3_enzimas"
  },
  cat3_resp:{
    title:"Respiración vs fermentación",
    oa:"RAA4 · Respiración aeróbica, anaerobiosis y fermentación",
    focus:"Comparar respiración celular, fermentación, oxígeno, NADH/NAD+ y rendimiento energético.",
    prompt:"¿Cuál es la diferencia funcional entre respiración celular y fermentación?",
    backend:"cat3_h5_resp_aerobica"
  }
};

const hitoOrder = ["cat3_dg","cat3_atp","cat3_enzimas","cat3_resp"];

const tourBase = [
  {
    title:"Tus estrellas",
    text:"Las estrellas no se ganan por hacer clic. pVANE las entrega solo cuando detecta mérito conceptual."
  },
  {
    title:"Tres niveles de avance",
    text:"Reconoce significa identificar. Explica significa relacionar. Integra significa conectar procesos celulares."
  },
  {
    title:"Tus hitos CAT3",
    text:"Cada hito representa un punto crítico de preparación para la evaluación."
  },
  {
    title:"VANE",
    text:"VANE no entrega respuestas directas. Te ayuda a construirlas paso a paso."
  },
  {
    title:"pTorpedo",
    text:"Tu guía personalizada aparecerá cuando logres tu primera estrella y crecerá con tus respuestas validadas."
  }
];

function makeStudentId(){
  let id = localStorage.getItem(STUDENT_ID_KEY);
  if(!id){
    id = "pvane_" + Math.random().toString(36).slice(2,10) + "_" + Date.now().toString(36);
    localStorage.setItem(STUDENT_ID_KEY, id);
  }
  return id;
}

function initialState(){
  return {
    started:false,
    tourSeen:false,
    tourIndex:0,
    identity:null,
    activeHito:"cat3_dg",
    chat:[],
    progress:{
      cat3_dg:{reconoce:0, explica:0, integra:0, stars:0},
      cat3_atp:{reconoce:0, explica:0, integra:0, stars:0},
      cat3_enzimas:{reconoce:0, explica:0, integra:0, stars:0},
      cat3_resp:{reconoce:0, explica:0, integra:0, stars:0}
    },
    unlocked:{cat3_dg:true, cat3_atp:false, cat3_enzimas:false, cat3_resp:false},
    ptorpedo:{confirmed:[], progress:[], next:[]},
    ptorpedoVisible:false,
    history:[]
  };
}

let state = loadState();

function loadState(){
  try{
    const loaded = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(!loaded) return initialState();
    const base = initialState();
    return {
      ...base,
      ...loaded,
      progress:{...base.progress, ...(loaded.progress||{})},
      unlocked:{...base.unlocked, ...(loaded.unlocked||{})},
      ptorpedo:{...base.ptorpedo, ...(loaded.ptorpedo||{})}
    };
  }catch(e){
    return initialState();
  }
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function totalStars(){
  return hitoOrder.reduce((sum,key)=>sum + (state.progress[key]?.stars || 0),0);
}

function readiness(){
  return Math.round((totalStars() / (hitoOrder.length * 3)) * 100);
}

function hitoStars(key){
  return state.progress[key]?.stars || 0;
}

function renderStars(key){
  const s = hitoStars(key);
  return "★".repeat(s) + "☆".repeat(3-s);
}

function levelFromEvaluation(ev){
  if((ev.integra || 0) >= 0.5) return "Integra";
  if((ev.explica || 0) >= 0.5) return "Explica";
  if((ev.reconoce || 0) >= 0.5 || (ev.star_awarded || 0) > 0) return "Reconoce";
  return "En proceso";
}

function starsFromEvaluation(ev){
  if((ev.integra || 0) >= 0.5) return 3;
  if((ev.explica || 0) >= 0.5) return 2;
  if((ev.reconoce || 0) >= 0.5 || (ev.star_awarded || 0) > 0) return 1;
  return 0;
}

function avatarSVG(id){
  const data = identities[id] || identities.ingeniero;
  return `
  <svg class="avatar" viewBox="0 0 100 100" aria-hidden="true">
    <circle cx="50" cy="50" r="40" fill="#fff"/>
    <circle cx="50" cy="50" r="40" fill="${data.color}" opacity=".28"/>
    <circle cx="38" cy="45" r="4" fill="#111827"/>
    <circle cx="62" cy="45" r="4" fill="#111827"/>
    <path d="M39 61 Q50 70 61 61" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
    <circle cx="29" cy="57" r="5" fill="#fca5a5" opacity=".9"/>
    <circle cx="71" cy="57" r="5" fill="#fca5a5" opacity=".9"/>
    <rect x="66" y="8" width="30" height="30" rx="8" fill="${data.color}" stroke="#111827" stroke-width="2"/>
    <text x="81" y="30" text-anchor="middle" font-size="18">${data.emoji}</text>
  </svg>`;
}

function addChat(role, text, cls){
  state.chat.push({role, text, cls:cls||role, time:Date.now()});
  if(state.chat.length > 60) state.chat.shift();
  saveState();
}

function pushHistory(role, content){
  state.history.push({role, content});
  if(state.history.length > 10) state.history.shift();
}

function uniquePush(arr, text){
  const clean = (text || "").trim();
  if(!clean) return;
  if(!arr.includes(clean)) arr.push(clean);
}

function render(){
  const root = document.getElementById("root");
  if(!state.started) return renderWelcome(root);
  if(!state.identity) return renderIdentity(root);
  renderApp(root);
}

function renderWelcome(root){
  root.innerHTML = `
  <div class="card" style="max-width:780px;margin:auto;text-align:center">
    <span class="badge">CBI111 · CAT3</span>
    <h1>Ruta voluntaria de preparación CAT3</h1>
    <p>Entorno de estudio autónomo guiado por pVANE.</p>
    <div class="notice">
      Participación voluntaria · Uso individual · No reemplaza evaluaciones oficiales del curso.<br>
      Las estrellas reflejan evidencia conceptual acumulada durante la conversación.
    </div>
    <p class="small">Primero definiremos tu identidad de estudio. Luego pVANE te guiará por hitos de metabolismo celular.</p>
    <button onclick="startRoute()">Comenzar</button>
  </div>`;
}

function startRoute(){
  state.started = true;
  saveState();
  render();
}

function renderIdentity(root=document.getElementById("root")){
  root.innerHTML = `
  <div class="card" style="max-width:920px;margin:auto;text-align:center">
    <span class="badge">Escaneo de frecuencia</span>
    <h2>Elige tu identidad inicial de estudio</h2>
    <p class="small">Esto cambia cómo te habla pVANE, no la dificultad del contenido. Tus estrellas dependen del mérito conceptual.</p>
    <div class="identity-grid">
      ${Object.entries(identities).map(([key,id])=>`
        <div class="identity-card" onclick="selectIdentity('${key}')">
          ${avatarSVG(key)}
          <h3>${id.name}</h3>
          <p class="small">${id.subtitle}</p>
        </div>
      `).join("")}
    </div>
  </div>`;
}

function selectIdentity(key){
  state.identity = key;
  state.tourSeen = false;
  state.tourIndex = 0;
  state.chat = [];
  addChat("vane", `Soy pVANE. No voy a regalar estrellas: las entregaré solo cuando vea evidencia conceptual.\n\n${identities[key].opener}`, "vane");
  saveState();
  render();
}

function buildTourSteps(){
  const id = identities[state.identity] || identities.ingeniero;
  return [
    {title:`Tu identidad: ${id.name}`, text:id.subtitle},
    {title:"Cómo mirar tu ruta", text:id.metaphor},
    ...tourBase
  ];
}

function renderTour(){
  if(state.tourSeen || !state.identity) return "";
  const steps = buildTourSteps();
  const step = steps[state.tourIndex] || steps[0];
  return `
  <div class="tour-overlay">
    <div class="tour-box">
      <div class="tour-step">Paso ${state.tourIndex+1} de ${steps.length}</div>
      <h2>${step.title}</h2>
      <p>${step.text}</p>
      <div class="actions" style="justify-content:flex-end">
        <button class="secondary" onclick="skipTour()">Saltar</button>
        <button onclick="nextTourStep()">${state.tourIndex >= steps.length-1 ? "Entrar a la ruta" : "Siguiente →"}</button>
      </div>
    </div>
  </div>`;
}

function nextTourStep(){
  const steps = buildTourSteps();
  if(state.tourIndex >= steps.length-1){
    state.tourSeen = true;
  }else{
    state.tourIndex++;
  }
  saveState();
  render();
}

function skipTour(){
  state.tourSeen = true;
  saveState();
  render();
}

function renderApp(root){
  const active = hitos[state.activeHito];
  const id = identities[state.identity] || identities.ingeniero;

  root.innerHTML = `
  <div class="app">
    <div class="card">
      <span class="badge">Ruta CAT3 · preparación guiada</span>

      <div class="identity-row">
        ${avatarSVG(state.identity)}
        <div>
          <h2 style="margin-bottom:4px">${id.name}</h2>
          <p class="small">${id.phrase}</p>
        </div>
      </div>

      <div class="identity-tools">
        <label class="small"><strong>Identidad activa</strong></label>
        <select onchange="changeIdentity(this.value)">
          ${Object.entries(identities).map(([key,item])=>`
            <option value="${key}" ${state.identity===key ? "selected" : ""}>${item.name}</option>
          `).join("")}
        </select>
        <p class="small">Puedes cambiar tu identidad para explorar otro modo de razonar. Las estrellas siguen dependiendo del mérito conceptual.</p>
      </div>

      <div class="progress-wrap">
        <div class="progress"><div class="progress-fill" style="width:${readiness()}%"></div></div>
        <p><strong>Readiness CAT3:</strong> ${readiness()}%</p>
      </div>

      <h3>Hitos CAT3</h3>
      <div class="milestones">
        ${hitoOrder.map(key=>renderMilestone(key)).join("")}
      </div>

      <div class="actions">
        <button onclick="askVanePrompt()">Pedir desafío pVANE</button>
        <button class="ghost" onclick="renderReport()">Ver pTorpedo completo</button>
        <button class="secondary" onclick="resetAll()">Reiniciar</button>
      </div>
    </div>

    <div class="card chat-panel">
      <h3>pVANE</h3>
      <p class="small"><strong>Foco actual:</strong> ${active.title}<br>${active.focus}</p>
      <div id="chatbox" class="chatbox">
        ${state.chat.map(m=>`<div class="msg ${m.cls}">${escapeHtml(m.text)}</div>`).join("")}
      </div>
      <textarea id="userInput" placeholder="Responde a pVANE. Tu progreso se validará según la calidad conceptual de tu explicación."></textarea>
      <div class="actions">
        <button onclick="sendToVane()">Enviar a pVANE</button>
      </div>
      <p class="small">VANE evalúa Reconoce · Explica · Integra. La UI solo muestra el estado cognitivo.</p>
    </div>

    ${renderPTorpedoPanel()}
  </div>
  ${renderTour()}`;

  scrollChat();
}

function renderMilestone(key){
  const h = hitos[key];
  const p = state.progress[key];
  const locked = !state.unlocked[key];
  return `
  <div class="milestone ${state.activeHito===key?'active':''} ${locked?'locked':''}" onclick="selectMilestone('${key}')">
    <div class="milestone-title">
      <span>${locked ? "🔒" : state.activeHito===key ? "✅" : "🔓"} ${h.title}</span>
      <span class="stars">${renderStars(key)}</span>
    </div>
    <div class="small">${h.oa}</div>
    <div class="levels">Reconoce ${p.reconoce}/1 · Explica ${p.explica}/1 · Integra ${p.integra}/1</div>
  </div>`;
}

function renderPTorpedoPanel(){
  const cls = state.ptorpedoVisible ? "card ptorpedo visible" : "card ptorpedo";
  return `
  <div class="${cls}">
    <h3>pTorpedo</h3>
    <p class="small">Guía personal construida desde tus respuestas validadas.</p>

    <div class="ptorpedo-section">
      <strong>✔ Conceptos confirmados</strong>
      ${renderList(state.ptorpedo.confirmed, "Aún no hay conceptos confirmados.")}
    </div>

    <div class="ptorpedo-section">
      <strong>△ Relaciones en progreso</strong>
      ${renderList(state.ptorpedo.progress, "Aún no hay relaciones en progreso.")}
    </div>

    <div class="ptorpedo-section">
      <strong>✱ Próximos pasos</strong>
      ${renderList(state.ptorpedo.next, "Aún no hay próximos pasos.")}
    </div>
  </div>`;
}

function renderList(items, empty){
  if(!items || items.length===0) return `<div class="empty">${empty}</div>`;
  return items.slice(-8).map(x=>`<div class="ptorpedo-item">${escapeHtml(x)}</div>`).join("");
}

function changeIdentity(key){
  state.identity = key;
  addChat("vane", `Cambio de lente registrado: ${identities[key].name}.\nMantienes tu avance, pero ahora usaré este lenguaje para guiarte.`, "system");
  saveState();
  render();
}

function selectMilestone(key){
  if(!state.unlocked[key]){
    addChat("vane", "Ese hito aún está bloqueado. Primero necesito ver evidencia suficiente en el hito anterior.", "system");
    saveState();
    render();
    return;
  }
  state.activeHito = key;
  addChat("vane", `Trabajemos este hito: ${hitos[key].title}.\n${hitos[key].prompt}`, "vane");
  saveState();
  render();
}

function askVanePrompt(){
  const h = hitos[state.activeHito];
  const id = identities[state.identity];
  addChat("vane", `${id.emoji} ${h.prompt}\n\nIntenta responder con causa, proceso y consecuencia celular.`, "vane");
  saveState();
  render();
}

function scrollChat(){
  setTimeout(()=>{
    const cb=document.getElementById("chatbox");
    if(cb) cb.scrollTop=cb.scrollHeight;
  },0);
}

function unlockNextMilestone(currentKey){
  const idx = hitoOrder.indexOf(currentKey);
  if(idx < 0 || idx >= hitoOrder.length-1) return;
  const next = hitoOrder[idx+1];
  if(!state.unlocked[next]){
    state.unlocked[next] = true;
    addChat("vane", `Ya tienes evidencia suficiente en este hito.\nHe desbloqueado el siguiente: ${hitos[next].title}.`, "award");
  }
}

function updateProgressFromEvaluation(key, ev){
  const p = state.progress[key];
  p.reconoce = Math.max(p.reconoce, Number(ev.reconoce || 0));
  p.explica = Math.max(p.explica, Number(ev.explica || 0));
  p.integra = Math.max(p.integra, Number(ev.integra || 0));

  const newStars = starsFromEvaluation(ev);
  const previousStars = p.stars || 0;
  p.stars = Math.max(previousStars, newStars);

  if(p.stars >= 1 && !state.ptorpedoVisible){
    state.ptorpedoVisible = true;
    addChat("vane", "Tu primera evidencia conceptual ya quedó registrada.\nHe abierto tu pTorpedo: desde ahora, tus avances empezarán a formar tu guía personal de estudio.", "award");
  }

  if(p.stars >= 2 || ev.unlock){
    unlockNextMilestone(key);
  }
}

function updatePTorpedoFromEvaluation(ev){
  const entry = ev.ptorpedo_entry || {};
  if(entry.conceptos_validados && entry.conceptos_validados.length){
    entry.conceptos_validados.forEach(c=>uniquePush(state.ptorpedo.confirmed, "✔ " + c));
  }
  if(entry.conexion_lograda){
    uniquePush(state.ptorpedo.confirmed, "✔ " + entry.conexion_lograda);
  }
  if(entry.error_a_corregir){
    uniquePush(state.ptorpedo.progress, "△ " + entry.error_a_corregir);
  }
  if(ev.next_prompt){
    uniquePush(state.ptorpedo.next, "✱ " + ev.next_prompt);
  }
  if(entry.frase_util_del_estudiante){
    uniquePush(state.ptorpedo.confirmed, "“" + entry.frase_util_del_estudiante + "”");
  }
}

async function sendToVane(){
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text) return;

  const currentKey = state.activeHito;
  const h = hitos[currentKey];

  addChat("user", "Tú: " + text, "user");
  pushHistory("student", text);
  input.value = "";

  addChat("vane", "pVANE está evaluando evidencia conceptual…", "system");
  saveState();
  render();

  try{
    const res = await fetch(ENDPOINT, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        student_id: makeStudentId(),
        milestone: h.backend,
        identity: state.identity,
        response: text,
        history: state.history
      })
    });

    const data = await res.json();
    removeThinkingMessage();

    if(!res.ok || data.error){
      throw new Error(data.details || data.error || "No se pudo evaluar con pVANE.");
    }

    const ev = data.evaluation || data;
    const level = levelFromEvaluation(ev);
    const vaneText = [
      ev.feedback || "Respuesta evaluada.",
      ev.next_prompt || ""
    ].filter(Boolean).join("\n\n");

    updateProgressFromEvaluation(currentKey, ev);
    updatePTorpedoFromEvaluation(ev);

    addChat("vane", `Nivel detectado: ${level}.\n\n${vaneText}`, ev.star_awarded > 0 || starsFromEvaluation(ev)>0 ? "award" : "vane");
    pushHistory("pvane", vaneText);

    if(data.persistence && data.persistence.saved === false){
      addChat("vane", "Nota técnica: evalué tu respuesta, pero el guardado externo aún no quedó confirmado. Tu progreso local sí quedó protegido.", "system");
    }

  }catch(err){
    removeThinkingMessage();
    addChat("vane", "No pude conectar con pVANE real en este intento.\nRevisa el deploy de Netlify Functions o la API key. Tu respuesta no recibió estrellas.", "system");
    console.error(err);
  }

  saveState();
  render();
}

function removeThinkingMessage(){
  for(let i=state.chat.length-1; i>=0; i--){
    if(state.chat[i].text === "pVANE está evaluando evidencia conceptual…"){
      state.chat.splice(i,1);
      return;
    }
  }
}

function renderReport(){
  const root = document.getElementById("root");
  const report = generateReport();
  root.innerHTML = `
  <div class="card" style="max-width:900px;margin:auto">
    <h1>pTorpedo CAT3</h1>
    <div class="report">${escapeHtml(report)}</div>
    <div class="actions">
      <button onclick="downloadReport()">Descargar Markdown</button>
      <button onclick="window.print()">Exportar PDF</button>
      <button onclick="render()">Volver</button>
    </div>
  </div>`;
}

function generateReport(){
  const lines = [];
  lines.push(`# pTorpedo CAT3 · CBI111`);
  lines.push(``);
  lines.push(`Identidad actual: ${identities[state.identity]?.name || "No definida"}`);
  lines.push(`Readiness CAT3: ${readiness()}%`);
  lines.push(``);
  lines.push(`## Progreso por hito`);
  hitoOrder.forEach(key=>{
    const h = hitos[key];
    const p = state.progress[key];
    lines.push(``);
    lines.push(`### ${h.title}`);
    lines.push(`${h.oa}`);
    lines.push(`Estrellas: ${renderStars(key)}`);
    lines.push(`- Reconoce: ${p.reconoce}/1`);
    lines.push(`- Explica: ${p.explica}/1`);
    lines.push(`- Integra: ${p.integra}/1`);
  });

  lines.push(``);
  lines.push(`## Conceptos confirmados`);
  if(state.ptorpedo.confirmed.length) state.ptorpedo.confirmed.forEach(x=>lines.push(`- ${x}`));
  else lines.push(`- Aún no hay conceptos confirmados.`);

  lines.push(``);
  lines.push(`## Relaciones en progreso`);
  if(state.ptorpedo.progress.length) state.ptorpedo.progress.forEach(x=>lines.push(`- ${x}`));
  else lines.push(`- Aún no hay relaciones en progreso.`);

  lines.push(``);
  lines.push(`## Próximos pasos`);
  if(state.ptorpedo.next.length) state.ptorpedo.next.forEach(x=>lines.push(`- ${x}`));
  else lines.push(`- Aún no hay próximos pasos.`);

  lines.push(``);
  lines.push(`## Checklist final`);
  lines.push(`☐ Explico ΔG y espontaneidad con consecuencia celular.`);
  lines.push(`☐ Relaciono ATP con reacciones endergónicas y acoplamiento.`);
  lines.push(`☐ Explico cómo las enzimas reducen energía de activación sin modificar ΔG.`);
  lines.push(`☐ Comparo respiración y fermentación usando O₂, NADH/NAD⁺ y ATP.`);
  return lines.join("\n");
}

function downloadReport(){
  const blob = new Blob([generateReport()], {type:"text/markdown"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "pTorpedo_CAT3_pVANE.md";
  a.click();
}

function resetAll(){
  if(confirm("¿Reiniciar todo el progreso local de esta ruta?")){
    localStorage.removeItem(STORAGE_KEY);
    state = initialState();
    render();
  }
}

function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

document.addEventListener("keydown", (e)=>{
  if(e.key==="T"){
    alert(`Panel docente local\nReadiness: ${readiness()}%\nEstrellas: ${totalStars()}/12\nFoco actual: ${hitos[state.activeHito]?.title}\nID local: ${makeStudentId()}`);
  }
  if((e.ctrlKey || e.metaKey) && e.key==="Enter"){
    const input=document.getElementById("userInput");
    if(input) sendToVane();
  }
});

render();
</script>
