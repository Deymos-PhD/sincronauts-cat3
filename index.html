<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruta CAT3 · pVANE</title>

<style>
:root{
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --blue:#2563eb;
  --blue-dark:#1d4ed8;
  --green:#16a34a;
  --amber:#f59e0b;
  --red:#dc2626;
  --line:#e5e7eb;
  --soft-blue:#eff6ff;
  --soft-green:#ecfdf5;
  --soft-amber:#fffbeb;
  --shadow:0 14px 42px rgba(15,23,42,.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:24px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:radial-gradient(circle at top left,#eef6ff 0,#f4f6fb 34%,#f7f9fc 100%);
  color:var(--text);
}

.card{
  background:var(--card);
  border-radius:24px;
  padding:28px;
  box-shadow:var(--shadow);
}

h1,h2,h3{margin-top:0}
p{line-height:1.45}
strong{font-weight:800}

button{
  border:0;
  border-radius:14px;
  padding:12px 18px;
  margin:6px;
  background:var(--blue);
  color:white;
  cursor:pointer;
  font-size:15px;
  font-weight:700;
  transition:.16s ease;
}

button:hover{
  background:var(--blue-dark);
  transform:translateY(-1px);
}

button.secondary{
  background:#e5e7eb;
  color:#111827;
}

button.ghost{
  background:#f8fafc;
  color:#1f2937;
  border:1px solid var(--line);
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
}

.small{
  font-size:13px;
  color:var(--muted);
}

.notice{
  background:#fff7ed;
  border:1px solid #fed7aa;
  color:#7c2d12;
  padding:14px;
  border-radius:16px;
  margin:16px 0;
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:var(--soft-blue);
  color:var(--blue);
  font-size:13px;
  font-weight:800;
}

.center{
  max-width:900px;
  margin:0 auto;
  text-align:center;
}

.identity-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:12px;
  margin-top:16px;
}

.identity-card, .answer-card{
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  background:#fbfdff;
  cursor:pointer;
  transition:.16s ease;
  text-align:left;
}

.identity-card:hover,.answer-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 22px rgba(15,23,42,.08);
  border-color:#93c5fd;
}

.answer-card{
  text-align:left;
  margin:10px 0;
}

.avatar{
  width:86px;
  height:86px;
  margin:6px auto 16px;
  display:block;
}

.quiz-progress{
  height:12px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
  margin:18px 0;
}

.quiz-fill{
  height:100%;
  background:linear-gradient(90deg,#2563eb,#16a34a);
  transition:.25s ease;
}

.app{
  max-width:1320px;
  margin:auto;
  display:grid;
  grid-template-columns:310px 1fr 310px;
  gap:18px;
}

.sidebar,.chat-panel,.ptorpedo-panel{
  min-height:calc(100vh - 48px);
}

.identity-pill{
  display:flex;
  gap:10px;
  align-items:center;
  padding:12px;
  border-radius:16px;
  background:#fbfdff;
  border:1px solid var(--line);
  margin-bottom:14px;
}

.identity-mini{
  font-size:28px;
  width:44px;
  height:44px;
  display:grid;
  place-items:center;
  border-radius:12px;
  background:var(--soft-blue);
}

.progress-wrap{
  margin:18px 0;
}

.progress{
  height:16px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
}

.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#2563eb,#16a34a);
  width:0%;
  transition:.3s ease;
}

.milestones{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.node{
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  text-align:left;
  background:#fbfdff;
  cursor:pointer;
  transition:.16s ease;
}

.node:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(15,23,42,.06);
}

.node.active{
  border-color:#60a5fa;
  background:#eff6ff;
}

.node.locked{
  opacity:.45;
  cursor:not-allowed;
}

.node-title{
  font-weight:900;
  margin-bottom:4px;
}

.stars{
  letter-spacing:1px;
  font-size:21px;
  margin-top:8px;
  color:#f59e0b;
}

.levels{
  margin-top:8px;
  font-size:12px;
  color:var(--muted);
}

.chatbox{
  height:calc(100vh - 300px);
  min-height:410px;
  overflow-y:auto;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  background:#fbfdff;
  text-align:left;
}

.msg{
  margin:10px 0;
  padding:12px 14px;
  border-radius:16px;
  max-width:94%;
  white-space:pre-wrap;
  line-height:1.4;
}

.user{
  margin-left:auto;
  background:#dbeafe;
}

.vane{
  margin-right:auto;
  background:#f3f4f6;
}

.award{
  margin-right:auto;
  background:#ecfdf5;
  border:1px solid #bbf7d0;
  color:#14532d;
}

.system{
  margin:12px auto;
  text-align:center;
  background:#fff7ed;
  border:1px solid #fed7aa;
  color:#7c2d12;
  font-size:13px;
}

textarea{
  width:100%;
  height:96px;
  margin-top:12px;
  border-radius:16px;
  border:1px solid var(--line);
  padding:12px;
  resize:none;
  font-family:inherit;
  font-size:15px;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  margin-top:10px;
}

.ptorpedo-panel{
  display:none;
}

.ptorpedo-panel.visible{
  display:block;
  animation:pop .35s ease;
}

@keyframes pop{
  from{opacity:0; transform:translateY(10px) scale(.98)}
  to{opacity:1; transform:translateY(0) scale(1)}
}

.ptorpedo-section{
  border:1px solid var(--line);
  background:#fbfdff;
  border-radius:16px;
  padding:14px;
  margin:12px 0;
}

.ptorpedo-item{
  font-size:13px;
  margin:8px 0;
  line-height:1.35;
}

.empty{
  color:var(--muted);
  font-size:13px;
}

.report{
  text-align:left;
  white-space:pre-wrap;
  border:1px solid var(--line);
  background:#fbfdff;
  border-radius:16px;
  padding:18px;
}

.tour-steps{
  text-align:left;
  max-width:720px;
  margin:18px auto;
}

.tour-step{
  display:flex;
  gap:12px;
  padding:12px;
  border:1px solid var(--line);
  background:#fbfdff;
  border-radius:16px;
  margin:10px 0;
}

.tour-icon{
  font-size:24px;
  width:38px;
  height:38px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:var(--soft-blue);
}

@media(max-width:1100px){
  body{padding:14px}
  .app{grid-template-columns:1fr}
  .sidebar,.chat-panel,.ptorpedo-panel{min-height:auto}
  .chatbox{height:420px}
}

@media print{
  body{background:white;padding:0}
  .app{display:block}
  .chat-panel,.sidebar,.actions,button,textarea{display:none!important}
  .card{box-shadow:none;border-radius:0}
  .ptorpedo-panel{display:block!important}
}
</style>
</head>

<body>
<div id="root"></div>

<script>
/* =========================================================
   PRE-PARÁSITO CAT3 v1
   Identidad → tour → hitos verticales → pVANE → estrellas → pTorpedo
   La API key nunca vive aquí. Este frontend solo llama a Netlify Functions.
   ========================================================= */

const STORAGE_KEY = "PRE_PARASITO_CAT3_V1";
const ENDPOINT = "/.netlify/functions/pvane-evaluate";

const identities = {
  ingeniero:{
    name:"Ingeniero",
    emoji:"🔧",
    color:"#f97316",
    phrase:"VANE usará lenguaje de sistemas, flujo, control y diagnóstico funcional.",
    opener:"Partamos por el mecanismo: ¿qué proceso celular se cae primero si falta energía utilizable?"
  },
  arqueologo:{
    name:"Arqueólogo",
    emoji:"🏺",
    color:"#92400e",
    phrase:"VANE usará lenguaje de evidencia, capas, huellas y reconstrucción conceptual.",
    opener:"Partamos reconstruyendo la evidencia: ¿qué señales te dicen que una célula necesita energía para mantenerse organizada?"
  },
  diplomatico:{
    name:"Diplomático",
    emoji:"🕊️",
    color:"#0ea5e9",
    phrase:"VANE usará lenguaje de interacción, regulación, comunicación y coordinación entre procesos.",
    opener:"Partamos conectando partes: ¿cómo se coordinan energía, enzimas y metabolismo para sostener la vida celular?"
  },
  estratega:{
    name:"Estratega",
    emoji:"🧠",
    color:"#8b5cf6",
    phrase:"VANE usará lenguaje de decisiones, consecuencias, prioridades e integración.",
    opener:"Partamos ordenando prioridades: si la célula pierde energía utilizable, ¿qué consecuencias aparecen primero?"
  }
};

const quizQuestions = [
  {
    q:"Cuando enfrentas un tema nuevo en biología celular, ¿qué haces primero?",
    a:[
      ["Busco el mecanismo: qué pieza hace qué y cómo falla.","ingeniero"],
      ["Busco antecedentes: de dónde viene la idea y qué evidencia la sostiene.","arqueologo"],
      ["Busco relaciones: qué procesos se conectan entre sí.","diplomatico"],
      ["Busco prioridades: qué variable controla el resultado final.","estratega"]
    ]
  },
  {
    q:"Si estudias metabolismo celular, ¿qué te ayuda más a entenderlo?",
    a:[
      ["Un esquema de flujo con entradas, salidas y puntos de control.","ingeniero"],
      ["Una explicación paso a paso que reconstruya el origen del proceso.","arqueologo"],
      ["Una conversación que conecte glucólisis, ATP, enzimas y respiración.","diplomatico"],
      ["Un caso problema donde deba decidir qué ruta conviene usar.","estratega"]
    ]
  },
  {
    q:"Cuando una respuesta te sale incompleta, ¿qué corrección te sirve más?",
    a:[
      ["Que me indiquen qué parte del mecanismo está fallando.","ingeniero"],
      ["Que me muestren qué evidencia omití o interpreté mal.","arqueologo"],
      ["Que me pregunten qué relación no estoy viendo.","diplomatico"],
      ["Que me pidan justificar la consecuencia de mi decisión conceptual.","estratega"]
    ]
  },
  {
    q:"Frente a una figura o gráfico de energía libre, ¿qué miras primero?",
    a:[
      ["La dirección del proceso y qué trabajo permite realizar.","ingeniero"],
      ["Las pistas: reactantes, productos y cambios en energía.","arqueologo"],
      ["Cómo se relaciona con ATP, enzimas u otra ruta metabólica.","diplomatico"],
      ["Qué predicción permite hacer sobre espontaneidad o eficiencia.","estratega"]
    ]
  },
  {
    q:"Si VANE te desafía, ¿qué tipo de pregunta te motiva más?",
    a:[
      ["¿Cómo arreglarías este sistema?","ingeniero"],
      ["¿Qué evidencia te permite afirmar eso?","arqueologo"],
      ["¿Con qué otro proceso se conecta?","diplomatico"],
      ["¿Qué pasaría si esa condición cambia?","estratega"]
    ]
  },
  {
    q:"Cuando preparas una prueba, ¿qué producto final te sirve más?",
    a:[
      ["Un mapa de procesos con causas y efectos.","ingeniero"],
      ["Un glosario comentado con conceptos y evidencias.","arqueologo"],
      ["Una red de relaciones entre conceptos clave.","diplomatico"],
      ["Una lista de decisiones conceptuales y consecuencias esperadas.","estratega"]
    ]
  },
  {
    q:"Si debes explicar ATP, prefieres partir diciendo:",
    a:[
      ["Es una molécula que permite ejecutar trabajo celular.","ingeniero"],
      ["Su estructura y su hidrólisis explican su papel energético.","arqueologo"],
      ["Conecta reacciones que liberan energía con otras que la requieren.","diplomatico"],
      ["Permite decidir qué procesos pueden sostenerse en una condición dada.","estratega"]
    ]
  },
  {
    q:"Tu mejor forma de demostrar comprensión es:",
    a:[
      ["Describir el mecanismo con precisión.","ingeniero"],
      ["Justificar la respuesta con evidencia conceptual.","arqueologo"],
      ["Conectar varios conceptos en una explicación coherente.","diplomatico"],
      ["Predecir consecuencias en un escenario nuevo.","estratega"]
    ]
  }
];

const milestones = {
  cat3_h1_termodinamica:{
    title:"Energía libre y termodinámica",
    short:"ΔG y espontaneidad",
    oa:"Unidad 3 · Sistemas, leyes termodinámicas y energía libre",
    focus:"Relacionar energía libre, espontaneidad y organización celular.",
    prompt:"¿Por qué una reacción con ΔG negativo puede ocurrir espontáneamente en la célula?",
    next:"cat3_h2_atp_redox"
  },
  cat3_h2_atp_redox:{
    title:"ATP, acoplamiento y REDOX",
    short:"ATP y REDOX",
    oa:"Unidad 3 · ATP, acoplamiento, oxidación y reducción",
    focus:"Explicar cómo ATP y transportadores de electrones conectan energía con trabajo celular.",
    prompt:"¿Cómo permite el ATP impulsar reacciones endergónicas y cómo se conecta esto con reacciones REDOX?",
    next:"cat3_h3_enzimas"
  },
  cat3_h3_enzimas:{
    title:"Enzimas y regulación",
    short:"Enzimas",
    oa:"Unidad 3 · Energía de activación, catálisis e inhibición",
    focus:"Explicar cómo las enzimas aceleran reacciones sin cambiar ΔG.",
    prompt:"¿Por qué las enzimas aceleran reacciones sin modificar el ΔG de la reacción?",
    next:"cat3_h6_anaerobiosis_fermentacion"
  },
  cat3_h6_anaerobiosis_fermentacion:{
    title:"Respiración y fermentación",
    short:"Respiración vs fermentación",
    oa:"Unidad 3 · Respiración aeróbica, anaerobiosis y fermentación",
    focus:"Distinguir respiración, fermentación, rendimiento energético y regeneración de NAD⁺.",
    prompt:"¿Cuál es la diferencia funcional entre respiración celular y fermentación?",
    next:null
  }
};

const milestoneOrder = Object.keys(milestones);
const levelNames = ["Reconoce","Explica","Integra"];
const levelKeys = ["reconoce","explica","integra"];

function initialState(){
  return {
    screen:"welcome",
    quizIndex:0,
    quizScores:{ingeniero:0, arqueologo:0, diplomatico:0, estratega:0},
    identity:null,
    activeMilestone:"cat3_h1_termodinamica",
    unlocked:{cat3_h1_termodinamica:true},
    progress:{
      cat3_h1_termodinamica:{reconoce:0, explica:0, integra:0},
      cat3_h2_atp_redox:{reconoce:0, explica:0, integra:0},
      cat3_h3_enzimas:{reconoce:0, explica:0, integra:0},
      cat3_h6_anaerobiosis_fermentacion:{reconoce:0, explica:0, integra:0}
    },
    chat:[],
    ptorpedo:{confirmed:[], progress:[], next:[]},
    ptorpedoVisible:false,
    studentId:null
  };
}

let state = loadState();

function loadState(){
  try{
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return saved || initialState();
  }catch(e){
    return initialState();
  }
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function studentId(){
  if(!state.studentId){
    state.studentId = "pvane_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    saveState();
  }
  return state.studentId;
}

function root(){ return document.getElementById("root"); }

function render(){
  if(state.screen==="welcome") return renderWelcome();
  if(state.screen==="quiz") return renderQuiz();
  if(state.screen==="tour") return renderTour();
  if(state.screen==="app") return renderApp();
  if(state.screen==="report") return renderReport();
}

function renderWelcome(){
  root().innerHTML = `
  <div class="card center">
    <span class="badge">CBI111 · CAT3</span>
    <h1>Ruta de preparación CAT3</h1>
    <p>Entorno voluntario de estudio autónomo guiado por pVANE.</p>
    <div class="notice">
      Participación voluntaria · Uso individual · No reemplaza evaluaciones oficiales del curso.<br>
      Tus estrellas dependen de mérito conceptual detectado durante el diálogo.
    </div>
    <p class="small">Primero haremos un cuestionario breve para definir tu identidad de estudio.</p>
    <button onclick="startQuiz()">Comenzar</button>
  </div>`;
}

function startQuiz(){
  state.screen="quiz";
  state.quizIndex=0;
  state.quizScores={ingeniero:0, arqueologo:0, diplomatico:0, estratega:0};
  saveState();
  render();
}

function renderQuiz(){
  const q = quizQuestions[state.quizIndex];
  const pct = Math.round((state.quizIndex / quizQuestions.length) * 100);
  root().innerHTML = `
  <div class="card center">
    <span class="badge">Escaneo de identidad · ${state.quizIndex+1}/${quizQuestions.length}</span>
    <h2>${q.q}</h2>
    <div class="quiz-progress"><div class="quiz-fill" style="width:${pct}%"></div></div>
    <div>
      ${q.a.map(([txt,id])=>`
        <div class="answer-card" onclick="answerQuiz('${id}')">
          <strong>${identities[id].emoji} ${identities[id].name}</strong>
          <p class="small">${txt}</p>
        </div>
      `).join("")}
    </div>
  </div>`;
}

function answerQuiz(identity){
  state.quizScores[identity] += 1;
  state.quizIndex += 1;

  if(state.quizIndex >= quizQuestions.length){
    const winner = Object.entries(state.quizScores).sort((a,b)=>b[1]-a[1])[0][0];
    state.identity = winner;
    state.screen = "tour";
    if(state.chat.length===0){
      addChat("vane", `Soy pVANE. Detecté una frecuencia inicial ${identities[winner].name}.\n\n${identities[winner].opener}`, "vane");
    }
  }

  saveState();
  render();
}

function renderTour(){
  const id = identities[state.identity];
  root().innerHTML = `
  <div class="card center">
    <span class="badge">Identidad definida</span>
    ${avatarSVG(state.identity)}
    <h1>Tu identidad: ${id.name}</h1>
    <p>${id.phrase}</p>

    <div class="tour-steps">
      <div class="tour-step"><div class="tour-icon">⭐</div><div><strong>Estrellas</strong><br><span class="small">No se ganan por hacer clic. pVANE las entrega cuando detecta evidencia conceptual.</span></div></div>
      <div class="tour-step"><div class="tour-icon">🧠</div><div><strong>Reconoce / Explica / Integra</strong><br><span class="small">Primero identificas, luego conectas mecanismos y finalmente integras procesos celulares.</span></div></div>
      <div class="tour-step"><div class="tour-icon">📍</div><div><strong>Hitos CAT3</strong><br><span class="small">Cada hito corresponde a un punto crítico de preparación para la evaluación.</span></div></div>
      <div class="tour-step"><div class="tour-icon">💬</div><div><strong>VANE</strong><br><span class="small">No entrega respuestas directas. Te guía con preguntas, pistas y validación progresiva.</span></div></div>
      <div class="tour-step"><div class="tour-icon">📄</div><div><strong>pTorpedo</strong><br><span class="small">Aparece solo cuando logras tu primera evidencia conceptual validada.</span></div></div>
    </div>

    <button onclick="enterRoute()">Entrar a la ruta</button>
  </div>`;
}

function enterRoute(){
  state.screen="app";
  saveState();
  render();
}

function avatarSVG(id){
  const data = identities[id] || identities.ingeniero;
  return `
  <svg class="avatar" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="40" fill="#fff"/>
    <circle cx="50" cy="50" r="40" fill="${data.color}" opacity=".24"/>
    <circle cx="38" cy="45" r="4" fill="#111827"/>
    <circle cx="62" cy="45" r="4" fill="#111827"/>
    <path d="M39 61 Q50 70 61 61" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
    <circle cx="29" cy="57" r="5" fill="#fca5a5" opacity=".9"/>
    <circle cx="71" cy="57" r="5" fill="#fca5a5" opacity=".9"/>
    <rect x="67" y="8" width="28" height="28" rx="8" fill="${data.color}" stroke="#111827" stroke-width="2"/>
    <text x="81" y="29" text-anchor="middle" font-size="18">${data.emoji}</text>
  </svg>`;
}

function readiness(){
  const all = Object.values(state.progress).flatMap(v=>[v.reconoce,v.explica,v.integra]);
  const total = all.reduce((a,b)=>a+Number(b||0),0);
  return Math.round((total / 12) * 100);
}

function starChar(v){
  v = Number(v||0);
  if(v >= 1) return "★";
  if(v >= .75) return "¾";
  if(v >= .5) return "½";
  if(v >= .25) return "¼";
  return "☆";
}

function milestoneStars(id){
  const p = state.progress[id];
  return starChar(p.reconoce) + starChar(p.explica) + starChar(p.integra);
}

function isUnlocked(id){
  return Boolean(state.unlocked[id]);
}

function activeMilestone(){
  return milestones[state.activeMilestone] || milestones.cat3_h1_termodinamica;
}

function renderApp(){
  const id = identities[state.identity];
  const active = activeMilestone();
  root().innerHTML = `
  <div class="app">
    <div class="card sidebar">
      <span class="badge">Ruta CAT3</span>
      <div class="identity-pill">
        <div class="identity-mini">${id.emoji}</div>
        <div>
          <strong>${id.name}</strong><br>
          <span class="small">${id.phrase}</span>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress"><div class="progress-fill" style="width:${readiness()}%"></div></div>
        <p><strong>Readiness CAT3:</strong> ${readiness()}%</p>
      </div>

      <h3>Hitos de preparación</h3>
      <div class="milestones">
        ${milestoneOrder.map(key=>`
          <div class="node ${state.activeMilestone===key?'active':''} ${!isUnlocked(key)?'locked':''}" onclick="selectMilestone('${key}')">
            <div class="node-title">${isUnlocked(key) ? "🔓" : "🔒"} ${milestones[key].short}</div>
            <div class="small">${milestones[key].oa}</div>
            <div class="stars">${milestoneStars(key)}</div>
            <div class="levels">${levelNames.map((l,i)=>`${l}: ${Math.round((state.progress[key][levelKeys[i]]||0)*100)}%`).join(" · ")}</div>
          </div>
        `).join("")}
      </div>

      <div class="actions">
        <button onclick="changeIdentity()">Cambiar identidad</button>
        <button class="secondary" onclick="resetAll()">Reiniciar</button>
      </div>
    </div>

    <div class="card chat-panel">
      <h2>pVANE</h2>
      <p class="small"><strong>Foco actual:</strong> ${active.title}<br>${active.focus}</p>
      <div id="chatbox" class="chatbox">
        ${state.chat.map(m=>`<div class="msg ${m.cls}">${escapeHTML(m.text)}</div>`).join("")}
      </div>
      <textarea id="userInput" placeholder="Escribe tu respuesta. pVANE evaluará Reconoce / Explica / Integra según evidencia conceptual."></textarea>
      <div class="actions">
        <button onclick="sendToVane()">Enviar a pVANE</button>
        <button class="ghost" onclick="askPrompt()">Pedir pregunta guía</button>
      </div>
      <p class="small">Las estrellas no son botones: aparecen solo si pVANE detecta mérito conceptual.</p>
    </div>

    <div class="card ptorpedo-panel ${state.ptorpedoVisible ? 'visible' : ''}">
      <span class="badge">pTorpedo</span>
      <h2>Guía personal</h2>
      <p class="small">Construida desde tus respuestas validadas.</p>
      ${renderPTorpedoHTML()}
      <div class="actions">
        <button onclick="renderReport()">Ver versión imprimible</button>
      </div>
    </div>
  </div>`;
  scrollChat();
}

function renderPTorpedoHTML(){
  const p = state.ptorpedo;
  return `
    <div class="ptorpedo-section">
      <strong>✔ Conceptos validados</strong>
      ${(p.confirmed.length ? p.confirmed.map(x=>`<div class="ptorpedo-item">✔ ${escapeHTML(x)}</div>`).join("") : `<div class="empty">Aún no hay conceptos validados.</div>`)}
    </div>
    <div class="ptorpedo-section">
      <strong>△ Relaciones en progreso</strong>
      ${(p.progress.length ? p.progress.map(x=>`<div class="ptorpedo-item">△ ${escapeHTML(x)}</div>`).join("") : `<div class="empty">Aparecerán cuando haya conexiones parciales.</div>`)}
    </div>
    <div class="ptorpedo-section">
      <strong>✱ Próximos pasos</strong>
      ${(p.next.length ? p.next.map(x=>`<div class="ptorpedo-item">✱ ${escapeHTML(x)}</div>`).join("") : `<div class="empty">VANE agregará sugerencias después de evaluar.</div>`)}
    </div>`;
}

function addChat(role, text, cls){
  state.chat.push({role,text,cls:cls||role});
  if(state.chat.length>60) state.chat.shift();
  saveState();
}

function scrollChat(){
  setTimeout(()=>{
    const box=document.getElementById("chatbox");
    if(box) box.scrollTop = box.scrollHeight;
  },0);
}

function selectMilestone(id){
  if(!isUnlocked(id)){
    addChat("vane","Ese hito aún está bloqueado. Primero necesito ver evidencia suficiente en el hito anterior.","vane");
    saveState();
    render();
    return;
  }
  state.activeMilestone = id;
  addChat("vane", `Trabajemos este hito: ${milestones[id].title}\n\n${milestones[id].prompt}`, "vane");
  saveState();
  render();
}

function askPrompt(){
  const m = activeMilestone();
  addChat("vane", `${identities[state.identity].emoji} ${m.prompt}\n\nResponde intentando incluir causa, proceso y consecuencia celular.`, "vane");
  saveState();
  render();
}

function changeIdentity(){
  state.screen="quiz";
  state.quizIndex=0;
  state.quizScores={ingeniero:0, arqueologo:0, diplomatico:0, estratega:0};
  addChat("system","Recalibrando identidad. Tus estrellas no se pierden.","system");
  saveState();
  render();
}

function escapeHTML(str){
  return String(str||"").replace(/[&<>"']/g, s=>({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
  }[s]));
}

function normalizeEvaluation(data){
  const ev = data?.evaluation || data || {};
  return {
    reconoce: Number(ev.reconoce ?? 0),
    explica: Number(ev.explica ?? 0),
    integra: Number(ev.integra ?? 0),
    star_awarded: Number(ev.star_awarded ?? 0),
    unlock: Boolean(ev.unlock),
    feedback: String(ev.feedback || data?.feedback || "Respuesta recibida."),
    next_prompt: String(ev.next_prompt || ""),
    evidence: Array.isArray(ev.evidence) ? ev.evidence : [],
    misconception_flags: Array.isArray(ev.misconception_flags) ? ev.misconception_flags : [],
    ptorpedo_entry: ev.ptorpedo_entry || {}
  };
}

function updateProgress(milestone, ev){
  const p = state.progress[milestone];
  p.reconoce = Math.max(Number(p.reconoce||0), clamp01(ev.reconoce));
  p.explica = Math.max(Number(p.explica||0), clamp01(ev.explica));
  p.integra = Math.max(Number(p.integra||0), clamp01(ev.integra));

  if(!state.ptorpedoVisible && (p.reconoce > 0 || p.explica > 0 || p.integra > 0)){
    state.ptorpedoVisible = true;
    addChat("award", "Tu primera evidencia conceptual ya quedó registrada.\nHe abierto tu pTorpedo: desde ahora, tus avances empezarán a formar tu guía personal de estudio.", "award");
  }

  const nextId = milestones[milestone].next;
  if(nextId && (ev.unlock || (p.reconoce >= .75 && p.explica >= .5))){
    if(!state.unlocked[nextId]){
      state.unlocked[nextId] = true;
      addChat("award", `Ya tienes evidencia suficiente en este hito.\nHe desbloqueado el siguiente: ${milestones[nextId].title}.`, "award");
    }
  }
}

function clamp01(n){
  n = Number(n);
  if(!Number.isFinite(n)) return 0;
  return Math.max(0, Math.min(1, n));
}

function pushUnique(arr, value){
  value = String(value||"").trim();
  if(!value) return;
  if(!arr.includes(value)) arr.push(value);
  if(arr.length > 10) arr.shift();
}

function updatePTorpedo(ev){
  const entry = ev.ptorpedo_entry || {};
  if(Array.isArray(entry.conceptos_validados)){
    entry.conceptos_validados.forEach(x=>pushUnique(state.ptorpedo.confirmed,x));
  }
  pushUnique(state.ptorpedo.progress, entry.conexion_lograda);
  pushUnique(state.ptorpedo.next, entry.error_a_corregir);
  if(ev.next_prompt) pushUnique(state.ptorpedo.next, ev.next_prompt);
}

function fallbackEvaluation(text){
  const t = text.toLowerCase();
  const hasCore = /atp|energ|enzim|gluc|nadh|fadh|redox|ferment|respir|oxigen|delta|dg|Δg/.test(t);
  const hasCause = /porque|permite|entonces|depende|consecuencia|por eso|si /.test(t);
  const hasIntegration = /relacion|conecta|sistema|proceso|metabol|catabol|anabol|gradiente/.test(t);

  return {
    reconoce: hasCore ? .5 : .25,
    explica: hasCause ? .5 : 0,
    integra: hasIntegration ? .25 : 0,
    unlock:false,
    feedback:"Modo respaldo activado: detecté algunos elementos conceptuales, pero no pude conectar con pVANE real en este intento.",
    next_prompt:"Intenta responder conectando causa, proceso y consecuencia celular.",
    ptorpedo_entry:{
      conceptos_validados: hasCore ? ["Concepto central identificado parcialmente"] : [],
      conexion_lograda: hasCause ? "Hay intento de explicación causal." : "",
      error_a_corregir: "Reintentar conexión con pVANE real o profundizar la relación conceptual.",
      frase_util_del_estudiante: text.slice(0,120)
    }
  };
}

async function sendToVane(){
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text) return;

  input.value = "";
  addChat("user","Tú: " + text,"user");
  addChat("vane","pVANE está pensando…","vane");
  saveState();
  render();

  let data, ev;
  try{
    const res = await fetch(ENDPOINT,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        student_id:studentId(),
        milestone:state.activeMilestone,
        identity:state.identity,
        response:text,
        history:state.chat.slice(-8).map(m=>({
          role:m.role==="user" ? "student" : "pvane",
          content:m.text
        }))
      })
    });

    data = await res.json();
    if(!res.ok) throw new Error(data?.details || data?.error || "Error pVANE");
    ev = normalizeEvaluation(data);
  }catch(error){
    ev = normalizeEvaluation({evaluation:fallbackEvaluation(text)});
  }

  // reemplaza el "pensando..."
  const idx = state.chat.map(m=>m.text).lastIndexOf("pVANE está pensando…");
  if(idx >= 0) state.chat.splice(idx,1);

  updateProgress(state.activeMilestone, ev);
  updatePTorpedo(ev);

  const vaneText = `pVANE: ${ev.feedback}${ev.next_prompt ? "\n\n" + ev.next_prompt : ""}`;
  addChat(ev.star_awarded > 0 ? "award" : "vane", vaneText, ev.star_awarded > 0 ? "award" : "vane");

  saveState();
  render();
}

function renderReport(){
  state.screen="report";
  saveState();

  const id = identities[state.identity] || identities.ingeniero;
  const lines = [];
  lines.push("pTorpedo · Ruta CAT3 CBI111");
  lines.push("");
  lines.push("Identidad activa: " + id.name);
  lines.push("Readiness CAT3: " + readiness() + "%");
  lines.push("");
  lines.push("Hitos:");
  milestoneOrder.forEach(k=>{
    lines.push("- " + milestones[k].title + " · " + milestoneStars(k));
  });
  lines.push("");
  lines.push("Conceptos validados:");
  if(state.ptorpedo.confirmed.length) state.ptorpedo.confirmed.forEach(x=>lines.push("✔ " + x));
  else lines.push("Aún no hay conceptos validados.");
  lines.push("");
  lines.push("Relaciones en progreso:");
  if(state.ptorpedo.progress.length) state.ptorpedo.progress.forEach(x=>lines.push("△ " + x));
  else lines.push("Aún no hay relaciones registradas.");
  lines.push("");
  lines.push("Próximos pasos:");
  if(state.ptorpedo.next.length) state.ptorpedo.next.forEach(x=>lines.push("✱ " + x));
  else lines.push("Aún no hay próximos pasos registrados.");

  root().innerHTML = `
  <div class="card center">
    <span class="badge">pTorpedo</span>
    <h1>Guía personal de estudio</h1>
    <div class="report">${escapeHTML(lines.join("\n"))}</div>
    <div class="actions">
      <button onclick="window.print()">Imprimir / guardar PDF</button>
      <button class="secondary" onclick="backToApp()">Volver</button>
    </div>
  </div>`;
}

function backToApp(){
  state.screen="app";
  saveState();
  render();
}

function resetAll(){
  if(confirm("¿Reiniciar la ruta local de este navegador?")){
    localStorage.removeItem(STORAGE_KEY);
    state = initialState();
    render();
  }
}

render();
</script>
</body>
</html>
