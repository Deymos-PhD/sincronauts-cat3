<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pSINCRO · CBI111</title>
<style>
:root{
  --bg:#f4f6fb; --card:#ffffff; --text:#111827; --muted:#64748b; --line:#e5e7eb;
  --blue:#2563eb; --blue-dark:#1d4ed8; --green:#16a34a; --amber:#f59e0b; --red:#dc2626;
  --soft-blue:#eff6ff; --soft-green:#ecfdf5; --soft-amber:#fffbeb; --soft-red:#fef2f2;
  --soft-card:#fbfdff; --surface:#f8fafc; --shadow:0 16px 50px rgba(15,23,42,.08);
  --gradient:radial-gradient(circle at top left,#e0f2fe 0,#f4f6fb 38%,#f8fafc 100%);
}
body.dark{
  --bg:#0f172a; --card:#111827; --text:#f8fafc; --muted:#cbd5e1; --line:#334155;
  --blue:#60a5fa; --blue-dark:#3b82f6; --green:#22c55e; --amber:#fbbf24; --red:#f87171;
  --soft-blue:#172554; --soft-green:#052e16; --soft-amber:#451a03; --soft-red:#450a0a;
  --soft-card:#1e293b; --surface:#020617; --shadow:0 18px 54px rgba(0,0,0,.38);
  --gradient:radial-gradient(circle at top left,#1e3a8a 0,#0f172a 40%,#020617 100%);
}
*{box-sizing:border-box}
body{
  margin:0; padding:22px; min-height:100vh; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--gradient); color:var(--text);
}
button{
  border:0; border-radius:14px; padding:12px 18px; margin:6px; background:var(--blue);
  color:white; cursor:pointer; font-size:15px; font-weight:800; transition:.16s ease;
}
button:hover{background:var(--blue-dark); transform:translateY(-1px)}
button.secondary{background:#e5e7eb;color:#111827}
button.ghost{background:var(--surface);color:var(--text);border:1px solid var(--line)}
button:disabled{opacity:.45;cursor:not-allowed;transform:none}
body.dark button.secondary{background:#334155;color:#f8fafc}
input,select,textarea{
  width:100%; border:1px solid var(--line); border-radius:14px; padding:12px; background:var(--card); color:var(--text);
  font:inherit; margin:6px 0 12px;
}
textarea{height:98px; resize:vertical}
h1,h2,h3{margin-top:0}
p{line-height:1.45}
.small{font-size:13px;color:var(--muted)}
.badge{display:inline-block;padding:6px 12px;border-radius:999px;background:var(--soft-blue);color:var(--blue);font-weight:900;font-size:13px}
.card{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:26px;box-shadow:var(--shadow)}
.center{max-width:980px;margin:0 auto;text-align:center}
.notice{
  background:var(--soft-amber); border:2px solid rgba(245,158,11,.45); color:#78350f;
  padding:18px; border-radius:20px; margin:18px 0; text-align:left;
}
body.dark .notice{color:#fde68a}
.ethics-hero{
  border:3px solid rgba(37,99,235,.32); background:linear-gradient(135deg,var(--soft-blue),var(--card));
  padding:22px; border-radius:24px; margin:24px 0; text-align:left;
}
.ethics-hero h2{margin-bottom:8px}
.footer{
  margin:28px auto 0; max-width:980px; text-align:center; color:var(--muted); font-size:13px; line-height:1.45;
}
.theme-toggle{
  position:fixed; top:16px; right:16px; z-index:40; display:flex; gap:6px; align-items:center;
  background:var(--card); border:1px solid var(--line); border-radius:999px; padding:6px; box-shadow:var(--shadow)
}
.theme-toggle button{margin:0;padding:8px 10px;background:transparent;color:var(--muted);border-radius:999px;font-size:13px}
.theme-toggle button.active{background:var(--soft-blue);color:var(--blue)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.field{text-align:left}
.check{
  display:flex; gap:10px; align-items:flex-start; text-align:left; background:var(--soft-card);
  border:1px solid var(--line); border-radius:16px; padding:14px; margin:10px 0;
}
.check input{width:auto;margin-top:3px}
.pilot-code{
  font-size:28px; letter-spacing:.08em; font-weight:950; background:var(--surface); border:1px dashed var(--blue);
  padding:14px; border-radius:18px; display:inline-block; margin:10px 0;
}
.app{max-width:1360px;margin:auto;display:grid;grid-template-columns:310px 1fr 330px;gap:18px}
.sidebar,.chat-panel,.ptorpedo-panel{min-height:calc(100vh - 44px)}
.identity-pill{display:flex;gap:10px;align-items:center;padding:12px;border-radius:16px;background:var(--soft-card);border:1px solid var(--line);margin:14px 0}
.identity-mini{font-size:28px;width:46px;height:46px;display:grid;place-items:center;border-radius:14px;background:var(--soft-blue)}
.progress{height:16px;border-radius:999px;overflow:hidden;background:var(--line);margin:12px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#16a34a);transition:.3s ease}
.node{border:1px solid var(--line);border-radius:18px;padding:14px;background:var(--soft-card);cursor:pointer;margin:10px 0;text-align:left}
.node.active{border-color:#60a5fa;background:var(--soft-blue)}
.node.locked{opacity:.55}
.node-title{font-weight:950;margin-bottom:4px}
.stars{letter-spacing:1px;font-size:21px;margin-top:8px;color:var(--amber)}
.chatbox{height:calc(100vh - 320px);min-height:410px;overflow-y:auto;border:1px solid var(--line);border-radius:20px;padding:14px;background:var(--soft-card);text-align:left}
.msg{margin:10px 0;padding:12px 14px;border-radius:16px;max-width:94%;white-space:pre-wrap;line-height:1.4}
.user{margin-left:auto;background:#dbeafe;color:#0f172a}
.guide{margin-right:auto;background:var(--surface)}
.award{margin-right:auto;background:var(--soft-green);border:1px solid #bbf7d0;color:#14532d}
.system{margin:12px auto;text-align:center;background:var(--soft-amber);border:1px solid #fed7aa;color:#7c2d12;font-size:13px}
body.dark .user{background:#172554;color:#dbeafe}
body.dark .award{color:#bbf7d0}
body.dark .system{color:#fde68a}
.actions{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;margin-top:10px}
.ptorpedo-section{border:1px solid var(--line);background:var(--soft-card);border-radius:18px;padding:14px;margin:12px 0;text-align:left}
.ptorpedo-section.priority{border:2px solid rgba(37,99,235,.28);background:linear-gradient(180deg,var(--soft-blue),var(--soft-card))}
.ptorpedo-section.pending{border:2px solid rgba(245,158,11,.34);background:linear-gradient(180deg,var(--soft-amber),var(--soft-card))}
.ptorpedo-item{font-size:13px;margin:8px 0;line-height:1.35}
.empty{color:var(--muted);font-size:13px}
.answer-card{
  border:1px solid var(--line); border-radius:18px; padding:16px; background:var(--soft-card); cursor:pointer;
  transition:.16s ease; text-align:left; margin:10px 0;
}
.answer-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(15,23,42,.08);border-color:#93c5fd}
.quiz-progress{height:12px;border-radius:999px;overflow:hidden;background:var(--line);margin:18px 0}
.quiz-fill{height:100%;background:linear-gradient(90deg,#2563eb,#16a34a);transition:.25s ease}
.avatar{width:86px;height:86px;margin:6px auto 16px;display:block}
.fanfare-toast{
  position:fixed;left:50%;top:22px;transform:translateX(-50%) translateY(-14px) scale(.96);z-index:80;
  background:var(--card);color:var(--text);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:22px;
  padding:16px 20px;min-width:min(420px,92vw);text-align:center;opacity:0;pointer-events:none;transition:.25s ease
}
.fanfare-toast.visible{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.fanfare-toast .big{font-size:30px;display:block;margin-bottom:4px}
.arch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:18px 0}
.arch-metric{border:1px solid var(--line);background:var(--soft-card);border-radius:18px;padding:16px;text-align:left}
.arch-metric .value{font-size:30px;font-weight:950;margin-top:6px}
.arch-control{border:1px solid var(--line);background:var(--soft-card);border-radius:16px;padding:14px;margin:12px 0;text-align:left}
.arch-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
.arch-table th,.arch-table td{border-bottom:1px solid var(--line);padding:10px;text-align:left}
.report{text-align:left;white-space:pre-wrap;border:1px solid var(--line);background:var(--soft-card);border-radius:16px;padding:18px}
@media(max-width:1100px){
  body{padding:14px}.app{grid-template-columns:1fr;max-width:850px}.sidebar,.chat-panel,.ptorpedo-panel{min-height:auto}.chatbox{height:420px}
}
@media(max-width:760px){
  body{padding:10px}.card{padding:18px;border-radius:20px}.center{max-width:100%}h1{font-size:1.75rem}h2{font-size:1.35rem}
  button{width:100%;margin:6px 0}.actions{display:grid;grid-template-columns:1fr;gap:6px}.chatbox{height:52vh;min-height:300px}
  .theme-toggle{position:sticky;top:8px;margin:0 auto 10px;justify-content:center;width:min(100%,360px)}
  .arch-table{font-size:12px;display:block;overflow-x:auto;white-space:nowrap}.app{gap:12px}
}
@media print{
  body{background:white;padding:0}.theme-toggle,.actions,button,textarea,.sidebar,.chat-panel{display:none!important}
  .card{box-shadow:none;border-radius:0}.app{display:block}.ptorpedo-panel{display:block!important}
}
</style>
</head>

const milestones = {
  cat3_h1_termodinamica:{title:"Energía celular y reacciones acopladas",short:"Energía celular",focus:"Exergónico/endergónico, ΔG básico, sistemas abiertos y acoplamiento funcional.",prompt:"Una célula debe sintetizar proteínas o replicar ADN: ¿por qué necesita energía y de dónde puede obtenerla?",next:"cat3_h2_enzimas"},
  cat3_h2_enzimas:{title:"Enzimas y regulación",short:"Enzimas",focus:"Energía de activación, especificidad, sitio activo, ajuste inducido, cofactores e inhibición.",prompt:"¿Por qué las enzimas permiten que las reacciones celulares ocurran más rápido y de forma específica?",next:"cat3_h3_atp_redox"},
  cat3_h3_atp_redox:{title:"ATP y transporte de energía",short:"ATP / REDOX",focus:"ATP, NADH/FADH₂, oxidación, reducción y transporte de electrones.",prompt:"¿Para qué le sirve el ATP a la célula y qué papel cumplen NADH o FADH₂ en el metabolismo?",next:"cat3_h6_anaerobiosis_fermentacion"},
  cat3_h6_anaerobiosis_fermentacion:{title:"Respiración y fermentación",short:"Respiración/Fermentación",focus:"Glicólisis, piruvato, oxígeno, fosforilación oxidativa, fermentación y NAD⁺.",prompt:"¿Cuál es la diferencia funcional entre respiración celular y fermentación?",next:null}
};
const milestoneOrder = Object.keys(milestones);
const levelKeys = ["reconoce","explica","integra"];

const cat3ExamMatrix = {
  triggers:[
    {concept:"sistema abierto",patterns:["sistema abierto","intercambia materia","intercambia energia","intercambia energía"],milestone:"cat3_h1_termodinamica"},

    {concept:"reacción exergónica libera energía",patterns:["exergonica","exergónica","libera energia","libera energía"],milestone:"cat3_h1_termodinamica"},

    {concept:"ATP libera energía utilizable",patterns:["atp","adp","fosfato","pi","se rompe","hidrolisis","hidrólisis"],milestone:"cat3_h3_atp_redox"},
    {concept:"NADH/FADH₂ transportan electrones",patterns:["nadh","fadh","transporta electrones","llevan electrones","cadena respiratoria"],milestone:"cat3_h3_atp_redox"},
    {concept:"oxidación pierde electrones",patterns:["pierde electrones","se oxida","oxidacion","oxidación"],milestone:"cat3_h3_atp_redox"},
    {concept:"reducción gana electrones",patterns:["gana electrones","se reduce","reduccion","reducción"],milestone:"cat3_h3_atp_redox"},
    {concept:"enzimas bajan energía de activación",patterns:["energia de activacion","energía de activación","baja la energia","baja la energía","catalizador","catalizadores"],milestone:"cat3_h2_enzimas"},
    {concept:"sitio activo",patterns:["sitio activo"],milestone:"cat3_h2_enzimas"},
    {concept:"especificidad enzimática",patterns:["especificidad","sustrato especifico","sustrato específico","amilasa","almidon","almidón"],milestone:"cat3_h2_enzimas"},
    {concept:"ajuste inducido",patterns:["ajuste inducido","cambia su forma","adapta al sustrato"],milestone:"cat3_h2_enzimas"},
    {concept:"inhibición competitiva",patterns:["inhibidor competitivo","inhibicion competitiva","inhibición competitiva"],milestone:"cat3_h2_enzimas"},
    {concept:"desnaturalización enzimática",patterns:["desnaturaliza","desnaturalizacion","desnaturalización","fiebre","estructura tridimensional"],milestone:"cat3_h2_enzimas"},
    {concept:"glucólisis ocurre en citoplasma",patterns:["glucolisis","glucólisis","citoplasma","citosol"],milestone:"cat3_h6_anaerobiosis_fermentacion"},
    {concept:"glucólisis produce piruvato",patterns:["piruvato"],milestone:"cat3_h6_anaerobiosis_fermentacion"},
    {concept:"oxígeno aceptor final de electrones",patterns:["oxigeno aceptor final","oxígeno aceptor final","aceptor final de electrones"],milestone:"cat3_h6_anaerobiosis_fermentacion"},
    {concept:"fosforilación oxidativa produce más ATP",patterns:["fosforilacion oxidativa","fosforilación oxidativa","mayor cantidad de atp"],milestone:"cat3_h6_anaerobiosis_fermentacion"},
    {concept:"fermentación regenera NAD⁺",patterns:["fermentacion","fermentación","regenera nad","nad+"],milestone:"cat3_h6_anaerobiosis_fermentacion"},
    {concept:"fermentación láctica",patterns:["lactato","fermentacion lactica","fermentación láctica"],milestone:"cat3_h6_anaerobiosis_fermentacion"},
    {concept:"levaduras producen etanol y CO₂",patterns:["levaduras","etanol","dioxido de carbono","dióxido de carbono"],milestone:"cat3_h6_anaerobiosis_fermentacion"},
    {concept:"ciclo de Cori",patterns:["ciclo de cori","higado","hígado","lactato en glucosa"],milestone:"cat3_h6_anaerobiosis_fermentacion"}

function initialState(){
  return {
    screen:"welcome",
    privateProfile:null,
    learningProfile:{pilot_id:null,nrc:null,email_hash:null,registered_at:null,consent:false},
    quizIndex:0, quizScores:{ingeniero:0,arqueologo:0,diplomatico:0,estratega:0},
    identity:null, activeMilestone:"cat3_h1_termodinamica", unlocked:{cat3_h1_termodinamica:true},
    progress:{
      cat3_h1_termodinamica:{reconoce:0,explica:0,integra:0},
      cat3_h2_enzimas:{reconoce:0,explica:0,integra:0},
      cat3_h3_atp_redox:{reconoce:0,explica:0,integra:0},
      cat3_h6_anaerobiosis_fermentacion:{reconoce:0,explica:0,integra:0}
    },
    chat:[], ptorpedo:{confirmed:[],progress:[],next:[],pending:[],resolvedPending:[]},
    ptorpedoVisible:false, events:[], sessions:[], vaneSettings:{level:"cat3_ready",fanfare:"full",maxAttempts:3}, obstacleMemory:{}
  };
}
let state = loadState(); migrateState(); saveState();

function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||initialState()}catch(e){return initialState()}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function migrateState(){
  const base=initialState();
  state.learningProfile=state.learningProfile||base.learningProfile;
  state.progress=state.progress||base.progress;
  state.ptorpedo=state.ptorpedo||base.ptorpedo;
  ["pending","resolvedPending","confirmed","progress","next"].forEach(k=>state.ptorpedo[k]=state.ptorpedo[k]||[]);
  state.events=state.events||[]; state.sessions=state.sessions||[]; state.vaneSettings=state.vaneSettings||base.vaneSettings; state.obstacleMemory=state.obstacleMemory||{};
}
function root(){return document.getElementById("root")}
function setTheme(theme){localStorage.setItem(THEME_KEY,theme==="dark"?"dark":"light");applyTheme()}
function applyTheme(){
  const theme=localStorage.getItem(THEME_KEY)||"light";
  document.body.classList.toggle("dark",theme==="dark");
  document.getElementById("lightModeBtn")?.classList.toggle("active",theme==="light");
  document.getElementById("darkModeBtn")?.classList.toggle("active",theme==="dark");
}
function render(){
  applyTheme();
  if(state.screen==="welcome") return renderWelcome();
  if(state.screen==="register") return renderRegister();
  if(state.screen==="pilotReady") return renderPilotReady();
  if(state.screen==="return") return renderReturn();
  if(state.screen==="recover") return renderRecover();
  if(state.screen==="quiz") return renderQuiz();
  if(state.screen==="app") return renderApp();
  if(state.screen==="architect") return renderArchitect();
  if(state.screen==="report") return renderReport();
}

  root().innerHTML=`

    </div>

}

function goRegister(){state.screen="register";saveState();render()}
function goReturn(){state.screen="return";saveState();render()}
function goRecover(){state.screen="recover";saveState();render()}

function renderRegister(){

  <div class="card center">

    <h1>Generar código piloto</h1>
    <div class="notice">
      <strong>Recordatorio:</strong> Participación voluntaria. No afecta tu nota. Tus datos pedagógicos se almacenan con un código interno. Los análisis se realizarán de forma pseudonimizada y agregada.

function generatePilotId(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s="";
  for(let i=0;i<5;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return "PS-CBI111-"+s;
}
function simpleHash(str){
  let h=0; str=String(str||"");
  for(let i=0;i<str.length;i++) h=((h<<5)-h)+str.charCodeAt(i)|0;
  return "h"+Math.abs(h).toString(36);
}
function createPilotId(){
  const email=document.getElementById("regEmail").value.trim().toLowerCase();
  const nrc=document.getElementById("regNrc").value.trim();
  const name=document.getElementById("regName").value.trim();
  const ok=document.getElementById("consentCheck").checked;
  if(!email || !nrc){alert("Ingresa correo y NRC/sección.");return}
  if(!ok){alert("Debes aceptar el consentimiento para registrar progreso personalizado.");return}
  const pid=state.learningProfile.pilot_id || generatePilotId();
  state.privateProfile={email,nrc,name,local_only:true,created_at:new Date().toISOString()};
  state.learningProfile={pilot_id:pid,nrc,email_hash:simpleHash(email),registered_at:new Date().toISOString(),consent:true};
  logEvent("registration_created",{nrc,email_hash:state.learningProfile.email_hash});
  state.screen="pilotReady"; saveState(); render();
}
function renderPilotReady(){
  root().innerHTML=`
  <div class="card center">
    <span class="badge">Código piloto generado</span>
    <h1>Guarda tu código</h1>
    <p>Tu progreso se guardará usando este código, no tu nombre.</p>
    <div class="pilot-code">${state.learningProfile.pilot_id}</div>
    <div class="actions">
      <button onclick="copyPilotId()">Copiar código</button>
      <button class="ghost" onclick="startQuiz()">Iniciar ruta</button>

    <div class="notice">Cuando conectemos Supabase, este código también podrá reenviarse al correo usado en la inscripción.</div>
  </div>`;
}
function copyPilotId(){navigator.clipboard?.writeText(state.learningProfile.pilot_id);alert("Código copiado.")}
function renderReturn(){
  root().innerHTML=`
  <div class="card center">
    <span class="badge">Retomar ruta</span>
    <h1>Ingresa tu código piloto</h1>
    <input id="returnCode" placeholder="PS-CBI111-XXXXX">
    <div class="actions">
      <button onclick="resumePilot()">Continuar</button>
      <button class="secondary" onclick="state.screen='welcome';saveState();render()">Volver</button>
    </div>
    <p class="small">En esta versión local, si el código coincide con el guardado en este navegador, recupera tu ruta. Con Supabase se recuperará desde la nube.</p>
  </div>`;
}
function resumePilot(){
  const code=document.getElementById("returnCode").value.trim().toUpperCase();
  if(!code){return}
  if(!state.learningProfile.pilot_id) state.learningProfile.pilot_id=code;
  if(code!==state.learningProfile.pilot_id){alert("Este navegador no tiene ese código guardado aún. Con Supabase podremos recuperarlo desde la nube.");return}
  logEvent("session_resumed",{});
  state.screen=state.identity?"app":"quiz"; saveState(); render();
}
function renderRecover(){
  root().innerHTML=`
  <div class="card center">
    <span class="badge">Recuperación</span>
    <h1>Olvidé mi código piloto</h1>
    <p>Ingresa el correo que usaste al inscribirte. Cuando conectemos Supabase, te enviaremos tu código a ese correo.</p>
    <input id="recoverEmail" type="email" placeholder="correo@ejemplo.cl">
    <div class="actions">
      <button onclick="recoverPilot()">Reenviar código</button>
      <button class="secondary" onclick="state.screen='welcome';saveState();render()">Volver</button>
    </div>
  </div>`;
}
function recoverPilot(){
  const email=document.getElementById("recoverEmail").value.trim().toLowerCase();
  if(!email){alert("Ingresa tu correo.");return}
  logEvent("pilot_recovery_requested",{email_hash:simpleHash(email)});
  if(state.privateProfile?.email===email && state.learningProfile?.pilot_id){
    alert("Modo local: tu código guardado en este navegador es "+state.learningProfile.pilot_id+". Con Supabase se enviará por correo.");
  }else{
    alert("Solicitud registrada. Con Supabase, el código se reenviará al correo si existe inscripción previa.");
  }
}

function startQuiz(){
  if(!state.learningProfile?.consent){alert("Primero debes completar la inscripción y consentimiento.");state.screen="register";saveState();render();return}
  state.screen="quiz"; state.quizIndex=0; state.quizScores={ingeniero:0,arqueologo:0,diplomatico:0,estratega:0}; saveState(); render();
}
function renderQuiz(){
  const q=quizQuestions[state.quizIndex], pct=Math.round((state.quizIndex/quizQuestions.length)*100);
  root().innerHTML=`
  <div class="card center">
    <span class="badge">Identidad de estudio · ${state.quizIndex+1}/${quizQuestions.length}</span>
    <h2>${q.q}</h2>
    <div class="quiz-progress"><div class="quiz-fill" style="width:${pct}%"></div></div>
    ${q.a.map(([txt,id],i)=>`<div class="answer-card" onclick="answerQuiz('${id}')"><strong>Opción ${i+1}</strong><p class="small">${txt}</p></div>`).join("")}
  </div>`;
}
function answerQuiz(id){
  state.quizScores[id]+=1; state.quizIndex+=1;
  if(state.quizIndex>=quizQuestions.length){
    state.identity=Object.entries(state.quizScores).sort((a,b)=>b[1]-a[1])[0][0];
    state.screen="app";
    addChat("guide",`Soy tu Guía de preparación. Detecté una frecuencia inicial ${identities[state.identity].name}.\n\n${identities[state.identity].opener}`,"guide");
    logEvent("identity_assigned",{identity:state.identity});
  }
  saveState(); render();
}
function avatarSVG(id){const x=identities[id]||identities.ingeniero;return `<svg class="avatar" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#fff"/><circle cx="50" cy="50" r="40" fill="#60a5fa" opacity=".24"/><circle cx="38" cy="45" r="4" fill="#111827"/><circle cx="62" cy="45" r="4" fill="#111827"/><path d="M39 61 Q50 70 61 61" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round"/><circle cx="29" cy="57" r="5" fill="#fca5a5"/><circle cx="71" cy="57" r="5" fill="#fca5a5"/><text x="50" y="28" text-anchor="middle" font-size="20">${x.emoji}</text></svg>`}
function readiness(){const all=Object.values(state.progress).flatMap(v=>levelKeys.map(k=>v[k]||0));return Math.round((all.reduce((a,b)=>a+b,0)/12)*100)}
function starChar(v){v=Number(v||0); if(v>=1)return"★"; if(v>=.75)return"¾"; if(v>=.5)return"½"; if(v>=.25)return"¼"; return"☆"}
function milestoneStars(id){const p=state.progress[id]; return starChar(p.reconoce)+starChar(p.explica)+starChar(p.integra)}
function isUnlocked(id){return !!state.unlocked[id]}
function renderApp(){
  const id=identities[state.identity]||identities.ingeniero, m=milestones[state.activeMilestone];
  root().innerHTML=`
  <div class="app">
    <div class="card sidebar">
      <span class="badge">Ruta CAT3 · ${state.learningProfile.pilot_id||"sin código"}</span>
      <div class="identity-pill"><div class="identity-mini">${id.emoji}</div><div><strong>${id.name}</strong><br><span class="small">${id.phrase}</span></div></div>
      <div class="progress"><div class="progress-fill" style="width:${readiness()}%"></div></div>
      <p><strong>Readiness CAT3:</strong> ${readiness()}%</p>
      <h3>Hitos</h3>
      ${milestoneOrder.map(k=>`<div class="node ${state.activeMilestone===k?'active':''} ${!isUnlocked(k)?'locked':''}" onclick="selectMilestone('${k}')"><div class="node-title">${isUnlocked(k)?"🔓":"🔒"} ${milestones[k].short}</div><div class="small">${milestones[k].focus}</div><div class="stars">${milestoneStars(k)}</div></div>`).join("")}
      <div class="actions">
        <button class="ghost" onclick="state.screen='report';saveState();render()">Ver guía imprimible</button>
        <button class="ghost" onclick="requestArchitectAccess()">Arquitecto</button>
      </div>
    </div>
    <div class="card chat-panel">
      <h2>Guía de preparación</h2>
      <p class="small"><strong>Foco actual:</strong> ${m.title}<br>${m.focus}</p>
      <div id="chatbox" class="chatbox">${state.chat.map(x=>`<div class="msg ${x.cls}">${escapeHTML(x.text)}</div>`).join("")}</div>
      <textarea id="userInput" placeholder="Escribe tu respuesta. ENTER envía · SHIFT+ENTER salto de línea"></textarea>
      <div class="actions"><button onclick="sendToGuide()">Enviar</button><button class="ghost" onclick="askPrompt()">Pregunta guía</button></div>
    </div>
    <div class="card ptorpedo-panel">
      <span class="badge">Guía personal</span><h2>pTorpedo</h2><p class="small">Tu síntesis personalizada de estudio.</p>
      ${renderPTorpedoHTML()}
      <div class="actions"><button onclick="state.screen='report';saveState();render()">Imprimir / PDF</button></div>
    </div>
  </div>`;
  scrollChat();
}
function renderPTorpedoHTML(){
  const p=state.ptorpedo;
  return `<div class="ptorpedo-section"><strong>✔ Conceptos validados</strong>${p.confirmed.length?p.confirmed.map(x=>`<div class="ptorpedo-item">✔ ${escapeHTML(x)}</div>`).join(""):`<div class="empty">Aún no hay conceptos validados.</div>`}</div>
  <div class="ptorpedo-section"><strong>📍 Ahora estás consolidando…</strong>${p.progress.length?p.progress.map(x=>`<div class="ptorpedo-item">📍 ${escapeHTML(x)}</div>`).join(""):`<div class="empty">Aparecerá el foco conceptual actual.</div>`}</div>
  <div class="ptorpedo-section priority"><strong>🧭 ¿Qué me está faltando?</strong>${p.next.length?p.next.map(x=>`<div class="ptorpedo-item">🧭 ${escapeHTML(x)}</div>`).join(""):`<div class="empty">Aquí aparecerán sugerencias para reforzar.</div>`}</div>
  <div class="ptorpedo-section pending"><strong>🧩 Conceptos pendientes</strong>${p.pending.length?p.pending.map(x=>`<div class="ptorpedo-item">🧩 ${escapeHTML(x)}</div>`).join(""):`<div class="empty">Si te quedas pegado, lo dejamos aquí y avanzamos.</div>`}${p.resolvedPending.length?`<div class="ptorpedo-item"><strong>Resueltos:</strong> ${p.resolvedPending.map(x=>"⭐ "+escapeHTML(x)).join(" · ")}</div>`:""}</div>`;
}
function selectMilestone(id){if(!isUnlocked(id)){addChat("guide","Ese hito aún está cerrado. Si te quedas pegado, lo abriremos dejando pendiente el obstáculo.","guide");saveState();render();return} state.activeMilestone=id; askPrompt();}
function askPrompt(){const m=milestones[state.activeMilestone]; addChat("guide",`${m.prompt}\n\nResponde con lenguaje simple: concepto clave + para qué sirve en la célula.`,"guide"); logEvent("milestone_opened",{milestone:state.activeMilestone}); saveState(); render();}
function addChat(role,text,cls){state.chat.push({role,text,cls:cls||role,ts:new Date().toISOString()}); if(state.chat.length>80)state.chat.shift();}
function scrollChat(){setTimeout(()=>{const b=document.getElementById("chatbox"); if(b)b.scrollTop=b.scrollHeight},0)}
function escapeHTML(str){return String(str||"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[s]))}
function normalizeText(t){return String(t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim()}
function detectCAT3(text){const t=normalizeText(text); return cat3ExamMatrix.triggers.filter(item=>item.patterns.some(p=>t.includes(normalizeText(p))))}
function pushUnique(arr,val){val=String(val||"").trim(); if(val&&!arr.includes(val))arr.push(val); if(arr.length>16)arr.shift();}
function showFanfare(type,title,sub){if(state.vaneSettings.fanfare==="off")return; let toast=document.getElementById("fanfareToast"); if(!toast){toast=document.createElement("div");toast.id="fanfareToast";toast.className="fanfare-toast";document.body.appendChild(toast)} const icon={star:"⭐",milestone:"🎺",pending:"🧩",route:"🏁"}[type]||"⭐"; toast.innerHTML=`<span class="big">${icon}</span><strong>${escapeHTML(title)}</strong><br><span class="small">${escapeHTML(sub||"")}</span>`; toast.classList.add("visible"); if(typeof confetti==="function"&&state.vaneSettings.fanfare==="full")confetti({particleCount:type==="route"?140:65,spread:80,origin:{y:.2}}); clearTimeout(window.__fan); window.__fan=setTimeout(()=>toast.classList.remove("visible"),2400);}
function applyCAT3Validation(text){
  const hits=detectCAT3(text); if(!hits.length)return false;
  hits.forEach(h=>{pushUnique(state.ptorpedo.confirmed,h.concept); pushUnique(state.ptorpedo.progress,"CAT3 real: "+h.concept); if(state.progress[h.milestone]){state.progress[h.milestone].reconoce=Math.max(state.progress[h.milestone].reconoce,1); state.progress[h.milestone].explica=Math.max(state.progress[h.milestone].explica,.75); const n=milestones[h.milestone].next; if(n)state.unlocked[n]=true;} resolvePending(h.concept); logEvent("concept_validated",{concept:h.concept,milestone:h.milestone});});
  state.ptorpedoVisible=true; addChat("award","⭐ Evidencia CAT3 real detectada: "+hits.slice(0,3).map(h=>h.concept).join(", ")+".\nValidé sin pedir formalización avanzada.","award"); showFanfare("star","Evidencia CAT3 real detectada","Concepto evaluado reconocido."); return true;
}
function resolvePending(concept){const i=state.ptorpedo.pending.indexOf(concept); if(i>=0){state.ptorpedo.pending.splice(i,1); pushUnique(state.ptorpedo.resolvedPending,concept); showFanfare("pending","Concepto pendiente resuelto",concept); logEvent("pending_resolved",{concept});}}
function maybePending(){
  const m=state.activeMilestone, b=state.obstacleMemory[m]||{attempts:0}; b.attempts++; state.obstacleMemory[m]=b;
  const p=state.progress[m]; if((p.reconoce>=.75&&p.explica>=.5)||b.attempts<state.vaneSettings.maxAttempts)return;
  const concept=m==="cat3_h1_termodinamica"?"acoplamiento energético":m==="cat3_h2_enzimas"?"función de enzimas":m==="cat3_h3_atp_redox"?"ATP/REDOX funcional":"respiración vs fermentación";
  pushUnique(state.ptorpedo.pending,concept); pushUnique(state.ptorpedo.next,"Retomar: "+concept); logEvent("concept_pending",{concept,milestone:m});
  const next=milestones[m].next; if(next)state.unlocked[next]=true;
  addChat("system","🧩 Dejé pendiente '"+concept+"' y avanzamos para retomarlo más adelante.","system");
}
function sendToGuide(){
  const input=document.getElementById("userInput"); const text=input.value.trim(); if(!text)return; input.value="";
  addChat("user","Tú: "+text,"user"); logEvent("response_sent",{milestone:state.activeMilestone,length:text.length});
  const hit=applyCAT3Validation(text);
  if(hit){
    const next=milestones[state.activeMilestone].next;
    if(next && state.unlocked[next]) addChat("guide","Perfecto. Esto ya alcanza nivel CAT3. Lo dejé en tu guía y podemos seguir con el siguiente hito cuando quieras.","guide");
    else addChat("guide","Perfecto. Lo dejé registrado en tu guía personal.","guide");
  }else{
    maybePending();
    addChat("guide","Vamos bien, pero falta que aparezca un concepto evaluado directamente. Te doy una pista: intenta nombrar el proceso y decir para qué sirve en la célula.","guide");
    pushUnique(state.ptorpedo.next,"Nombrar proceso + función celular.");
  }
  if(readiness()>=100){showFanfare("route","Ruta CAT3 completada","Tu guía personal está lista."); logEvent("route_completed",{})}
  saveState(); render();
}
document.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey&&e.target?.id==="userInput"){e.preventDefault();sendToGuide()}});

function logEvent(type,payload){state.events.push({event_type:type,pilot_id:state.learningProfile?.pilot_id||null,ts:new Date().toISOString(),payload:payload||{}}); if(state.events.length>500)state.events.shift();}
function requestArchitectAccess(){const pass=prompt("Clave arquitecto:"); if(pass===ARCH_PASS){localStorage.setItem("ARCHITECT_ACCESS","true"); state.screen="architect"; saveState(); render();}else if(pass!==null)alert("Acceso denegado");}
function renderArchitect(){
  root().innerHTML=`<div class="card center" style="max-width:1200px">
    <span class="badge">Arquitecto · datos locales</span><h1>Dashboard pSINCRO</h1>
    <p class="small">CSV NN exporta código piloto y métricas pedagógicas, sin nombre ni correo.</p>
    <div class="arch-grid">
      <div class="arch-metric"><strong>Pilot ID</strong><div class="value" style="font-size:20px">${state.learningProfile.pilot_id||"—"}</div></div>
      <div class="arch-metric"><strong>Readiness</strong><div class="value">${readiness()}%</div></div>
      <div class="arch-metric"><strong>Eventos</strong><div class="value">${state.events.length}</div></div>
      <div class="arch-metric"><strong>Pendientes</strong><div class="value">${state.ptorpedo.pending.length}</div></div>
    </div>
    <div class="arch-grid">
      <div class="arch-control"><strong>Nivel guía</strong><select onchange="state.vaneSettings.level=this.value;saveState();render()"><option value="cat3_ready">CAT3-ready</option><option value="exploratorio">Exploratorio</option><option value="cat3_plus">CAT3+ N+S</option></select></div>
      <div class="arch-control"><strong>Fanfarria</strong><select onchange="state.vaneSettings.fanfare=this.value;saveState();render()"><option value="full">Completa</option><option value="minimal">Mínima</option><option value="off">OFF</option></select></div>
      <div class="arch-control"><strong>Intentos antes de pendiente</strong><select onchange="state.vaneSettings.maxAttempts=Number(this.value);saveState();render()"><option>2</option><option selected>3</option><option>4</option></select></div>
    </div>
    <h3>Acceso directo</h3>
    <div class="actions">${milestoneOrder.map(k=>`<button class="ghost" onclick="jumpToMilestone('${k}')">${milestones[k].short}</button>`).join("")}</div>
    <h3>Exportación</h3>
    <div class="actions"><button onclick="downloadNNCSV()">Descargar CSV NN</button><button class="ghost" onclick="downloadEventsCSV()">Descargar eventos NN</button><button class="secondary" onclick="state.screen='app';saveState();render()">Volver</button></div>
    <table class="arch-table"><thead><tr><th>Hito</th><th>Estado</th><th>Estrellas</th></tr></thead><tbody>${milestoneOrder.map(k=>`<tr><td>${milestones[k].short}</td><td>${isUnlocked(k)?"abierto":"cerrado"}</td><td>${milestoneStars(k)}</td></tr>`).join("")}</tbody></table>
  </div>`;
}
function jumpToMilestone(k){if(!state.identity)state.identity="ingeniero"; state.unlocked[k]=true; state.activeMilestone=k; state.screen="app"; addChat("system","Modo arquitecto: acceso directo a "+milestones[k].title,"system"); saveState(); render(); setTimeout(askPrompt,100)}
function csvEscape(v){return `"${String(v??"").replace(/"/g,'""')}"`}
function downloadFile(name,content){const blob=new Blob([content],{type:"text/csv;charset=utf-8"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href)}
function downloadNNCSV(){
  const row={pilot_id:state.learningProfile.pilot_id,nrc:state.learningProfile.nrc,identity:state.identity,readiness:readiness(),hitos_abiertos:milestoneOrder.filter(isUnlocked).length,conceptos_validados:state.ptorpedo.confirmed.length,pendientes:state.ptorpedo.pending.length,pendientes_resueltos:state.ptorpedo.resolvedPending.length,eventos:state.events.length};
  const headers=Object.keys(row); downloadFile("psincro_export_NN.csv",headers.join(",")+"\n"+headers.map(h=>csvEscape(row[h])).join(","));
}
function downloadEventsCSV(){
  const headers=["pilot_id","ts","event_type","payload"];
  const rows=state.events.map(e=>[e.pilot_id,e.ts,e.event_type,JSON.stringify(e.payload)].map(csvEscape).join(","));
  downloadFile("psincro_eventos_NN.csv",headers.join(",")+"\n"+rows.join("\n"));
}
function renderReport(){
  const lines=[]; lines.push("pSINCRO · Guía personal CBI111"); lines.push("Pilot ID: "+(state.learningProfile.pilot_id||"—")); lines.push("Identidad: "+(identities[state.identity]?.name||"—")); lines.push("Readiness CAT3: "+readiness()+"%"); lines.push(""); lines.push("Conceptos validados:"); state.ptorpedo.confirmed.forEach(x=>lines.push("✔ "+x)); lines.push(""); lines.push("¿Qué me está faltando?"); state.ptorpedo.next.forEach(x=>lines.push("🧭 "+x)); lines.push(""); lines.push("Pendientes:"); state.ptorpedo.pending.forEach(x=>lines.push("🧩 "+x));
  root().innerHTML=`<div class="card center"><span class="badge">Guía imprimible</span><h1>Guía personal de estudio</h1><div class="report">${escapeHTML(lines.join("\n"))}</div><div class="actions"><button onclick="window.print()">Imprimir / PDF</button><button class="secondary" onclick="state.screen='app';saveState();render()">Volver</button></div></div>`;
}
render();
</script>
