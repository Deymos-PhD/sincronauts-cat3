<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>pSINCRO CAT3</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial; margin:20px; background:#0f172a; color:#e2e8f0;}
button{padding:10px; margin:5px; border-radius:8px;}
.card{background:#1e293b; padding:15px; border-radius:12px; margin-bottom:10px;}
</style>
</head>

<body>

<h1>🧬 pSINCRO CAT3</h1>

<div class="card">
<button onclick="openStudent()">Entrar como estudiante</button>
<button onclick="openArchitect()">Acceso arquitecto</button>
<button onclick="startDemo()">Demo sin guardar</button>
</div>

<div id="app"></div>

<script>
const SUPABASE_URL = "https://vogdknwdrbzabvfekhpg.supabase.co";
const SUPABASE_KEY = "sb_publishable_0FqxLuaRhzPMLHjO4f-dWA_i7-pl7AD";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const db = supabase;

window.isArchitectMode = false;
window.demoNoSaveMode = false;

let state = {
  identity:null,
  readiness:0
};

function openStudent(){
  renderStudent();
}

function openArchitect(){
  window.isArchitectMode = true;
  renderArchitect();
}

function startDemo(){
  window.demoNoSaveMode = true;
  alert("Modo demo activado (sin guardar datos)");
  renderStudent();
}

function renderStudent(){
  document.getElementById("app").innerHTML = `
    <div class="card">
    <h2>Ruta CAT3</h2>
    <button onclick="startJourney()">Comenzar</button>
    </div>
  `;
}

function renderArchitect(){
  document.getElementById("app").innerHTML = `
    <div class="card">
    <h2>Panel arquitecto</h2>
    <button onclick="loadDashboard()">Actualizar dashboard</button>
    <div id="dashboard"></div>
    </div>
  `;
}

function startJourney(){
  state.identity = pickIdentity();
  alert("Tu perfil: " + state.identity);

  askQuestion();
}

function pickIdentity(){
  const ids = ["Ingeniero","Arqueólogo","Diplomático"];
  return ids[Math.floor(Math.random()*ids.length)];
}

/* --------------------------
   PROMPTS CALIBRADOS CAT3
-------------------------- */

function vanePrompt(){
  const prompts = [
    "¿Qué es ATP en tus palabras?",
    "¿Para qué sirve la energía en la célula?",
    "¿Qué hacen las enzimas de forma simple?",
    "¿Cómo se relaciona ATP con otros procesos?"
  ];
  return prompts[Math.floor(Math.random()*prompts.length)];
}

function askQuestion(){
  const q = vanePrompt();

  document.getElementById("app").innerHTML = `
    <div class="card">
    <h3>${q}</h3>
    <textarea id="answer" rows="4" style="width:100%"></textarea>
    <br><br>
    <button onclick="submitAnswer()">Responder</button>
    </div>
  `;
}

function submitAnswer(){
  const ans = document.getElementById("answer").value;

  let score = evaluate(ans);

  state.readiness += score;

  saveProgress();

  alert("Progreso: " + state.readiness.toFixed(2));

  askQuestion();
}

/* --------------------------
   EVALUACIÓN SIMPLE CAT3
-------------------------- */

function evaluate(text){
  if(text.length < 10) return 0.2;
  if(text.length < 40) return 0.5;
  return 1;
}

/* --------------------------
   SUPABASE (con bloqueo demo)
-------------------------- */

async function saveProgress(){

  if(window.demoNoSaveMode) return;

  const email = "sim-" + Math.random().toString(36).slice(2,6) + "@demo.local";

  let { data:student } = await db
    .from("students")
    .insert([{email}])
    .select()
    .single();

  await db.from("journeys").insert([{
    student_id:student.id,
    identity:state.identity,
    readiness:state.readiness,
    mode: window.isArchitectMode ? "simulation" : "real"
  }]);
}

/* --------------------------
   DASHBOARD SIMPLE
-------------------------- */

async function loadDashboard(){

  const { data } = await db.from("journeys").select("*");

  const total = data.length;
  const sim = data.filter(x=>x.mode==="simulation").length;
  const real = data.filter(x=>x.mode==="real").length;

  const avg = total ? 
    (data.reduce((a,b)=>a+b.readiness,0)/total).toFixed(2)
    : 0;

  document.getElementById("dashboard").innerHTML = `
    <div class="card">
    Total: ${total}<br>
    Simulación: ${sim}<br>
    Real: ${real}<br>
    Promedio readiness: ${avg}
    </div>
  `;
}
</script>

</body>
</html>
