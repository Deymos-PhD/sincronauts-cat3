<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruta CAT3 · pVANE</title>

<style>
body{
font-family:system-ui;
background:#f5f7fa;
margin:0;
padding:40px;
display:flex;
justify-content:center;
}
.card{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 8px 30px rgba(0,0,0,.08);
width:560px;
text-align:center;
}
button{
margin:8px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:15px;
}
.secondary{
background:#e5e7eb;
color:#111;
}
.options button{
display:block;
width:100%;
}
textarea{
width:92%;
height:140px;
margin-top:15px;
}
.badge{
font-size:13px;
color:#555;
}
.star{
font-size:22px;
margin:10px 0;
}
.small{
font-size:13px;
color:#777;
}
</style>
</head>
<body>

<div id="app"></div>

<script>

/* ================= STATE ================= */

function loadState(){
const saved = localStorage.getItem("pVANE_CAT3");
if(saved) return JSON.parse(saved);

return {
identity:null,
stars:{
hito1:[0,0,0],
hito2:[0,0,0],
hito3:[0,0,0],
hito4:[0,0,0]
},
simScore:null
};
}

let state = loadState();

function saveState(){
localStorage.setItem("pVANE_CAT3",JSON.stringify(state));
}

/* ================= DATA ================= */

const identities=[
"cartografo",
"ingeniero",
"analista",
"explorador",
"medico",
"estratega",
"docente"
];

const identityPhrases={
cartografo:"Ubica cada proceso energético dentro del mapa metabólico celular.",
ingeniero:"Interpreta la célula como sistema optimizado de energía.",
analista:"Compara eficiencia entre rutas metabólicas.",
explorador:"Relaciona energía con adaptación celular.",
medico:"Conecta energía con funcionamiento fisiológico.",
estratega:"Evalúa decisiones energéticas celulares.",
docente:"Explícalo como si enseñaras a otra persona."
};

const quickChecks={

hito1:{
q:"¿Por qué la célula necesita energía en reposo?",
options:[
"Mantener organización interna",
"Producir ADN continuamente",
"Dividirse permanentemente",
"Eliminar oxígeno"
],
correct:0
},

hito2:{
q:"¿Qué caracteriza al ATP?",
options:[
"Almacena genes",
"Libera energía inmediata",
"Transporta oxígeno",
"Forma membranas"
],
correct:1
},

hito3:{
q:"¿Qué hacen las enzimas?",
options:[
"Reducen energía de activación",
"Aumentan temperatura celular",
"Producen ATP siempre",
"Destruyen glucosa"
],
correct:0
},

hito4:{
q:"¿Qué permite el oxígeno?",
options:[
"Fermentación",
"Mayor rendimiento energético",
"Menor ATP",
"Inhibición celular"
],
correct:1
}

};

const microEssay={

hito1:"Explica en máximo 3 líneas por qué la célula necesita energía incluso en reposo.",
hito2:"Explica en máximo 3 líneas por qué el ATP funciona como moneda energética inmediata.",
hito3:"Explica en máximo 3 líneas cómo las enzimas permiten que la célula funcione.",
hito4:"Explica en máximo 3 líneas por qué el oxígeno aumenta el rendimiento energético."

};

const summaries={

hito1:"La célula mantiene gradientes, transporte activo y organización interna.",
hito2:"ATP entrega energía inmediata y reciclable continuamente.",
hito3:"Las enzimas reducen energía de activación acelerando reacciones.",
hito4:"Oxígeno permite máxima eficiencia energética en respiración aeróbica."

};

const cat3Simulation=[

{
q:"¿Cuál es la función principal del ATP?",
options:[
"Almacenar información genética",
"Moneda energética inmediata",
"Transportar oxígeno",
"Regular pH"
],
correct:1
},

{
q:"¿Por qué las enzimas aceleran reacciones?",
options:[
"Aumentan temperatura",
"Reducen energía activación",
"Consumen ADN",
"Destruyen sustratos"
],
correct:1
},

{
q:"¿Qué proceso genera mayor rendimiento energético?",
options:[
"Fermentación",
"Glicólisis",
"Respiración aeróbica",
"Transporte pasivo"
],
correct:2
},

{
q:"¿Qué ocurre si falta oxígeno?",
options:[
"Se detiene todo metabolismo",
"Se usa fermentación",
"Aumenta ATP",
"No ocurre cambio"
],
correct:1
},

{
q:"¿Por qué el metabolismo requiere regulación?",
options:[
"Evitar gasto energético innecesario",
"Eliminar ADN",
"Producir oxígeno",
"Aumentar volumen celular"
],
correct:0
}

];

/* ================= HELPERS ================= */

function getStars(h){
return state.stars[h];
}

function setStars(h,i,val){
state.stars[h][i]=val;
saveState();
}

/* ================= UI ================= */

const app=document.getElementById("app");

function renderIdentitySelector(){

app.innerHTML=`
<div class="card">
<h2>Selecciona tu identidad</h2>
${identities.map(i=>`
<button onclick="selectIdentity('${i}')">${i}</button>
`).join("")}
</div>
`;

}

function selectIdentity(id){
state.identity=id;
saveState();
renderRoute();
}

function renderRoute(){

app.innerHTML=`
<div class="card">
<h2>Ruta CAT3</h2>
<p>${identityPhrases[state.identity]}</p>

${["hito1","hito2","hito3","hito4"].map(h=>`
<button onclick="renderQuickCheck('${h}')">
${h.toUpperCase()} ⭐ ${getStars(h).reduce((a,b)=>a+b,0)}
</button>
`).join("")}

<br>

<button onclick="renderPTorpedo()">Ver pTorpedo</button>
<button class="secondary" onclick="resetProgress()">Reiniciar progreso</button>

</div>
`;

}

function renderQuickCheck(h){

const item=quickChecks[h];

app.innerHTML=`
<div class="card">
<span class="badge">Chequeo conceptual</span>
<h3>${item.q}</h3>
<div class="options">
${item.options.map((opt,i)=>`
<button onclick="resolveQuickCheck('${h}',${i})">
${opt}
</button>
`).join("")}
</div>
</div>
`;

}

function resolveQuickCheck(h,index){

const correct=quickChecks[h].correct;
setStars(h,0,index===correct?1:0);
renderMicroEssay(h);

}

function renderMicroEssay(h){

app.innerHTML=`
<div class="card">
<span class="badge">Ensayo express</span>
<h3>${microEssay[h]}</h3>
<textarea placeholder="Escribe aquí tu respuesta"></textarea>
<br>
<button onclick="finishEssay('${h}')">Continuar</button>
</div>
`;

}

function finishEssay(h){

setStars(h,1,1);
startSimulation();

}

/* ================= SIMULATION ================= */

function startSimulation(){

state.simIndex=0;
state.simScore=0;

renderSimulationQuestion();

}

function renderSimulationQuestion(){

const item=cat3Simulation[state.simIndex];

app.innerHTML=`
<div class="card">
<span class="badge">Simulación CAT3</span>
<h3>${item.q}</h3>
<div class="options">
${item.options.map((opt,i)=>`
<button onclick="answerSimulation(${i})">${opt}</button>
`).join("")}
</div>
<p class="small">
Pregunta ${state.simIndex+1} de ${cat3Simulation.length}
</p>
</div>
`;

}

function answerSimulation(index){

const item=cat3Simulation[state.simIndex];

if(index===item.correct){
state.simScore++;
}

state.simIndex++;
saveState();

if(state.simIndex<cat3Simulation.length){
renderSimulationQuestion();
}else{
renderSimulationResult();
}

}

function renderSimulationResult(){

app.innerHTML=`
<div class="card">
<h2>Resultado simulación CAT3</h2>
<h3>${state.simScore} / ${cat3Simulation.length}</h3>
<button onclick="renderPTorpedo()">Generar pTorpedo final</button>
</div>
`;

}

/* ================= CHECKLIST ================= */

function buildChecklist(){

return`
□ Explico por qué la célula necesita energía constante
□ Explico el rol del ATP
□ Explico función de enzimas
□ Comparo respiración vs fermentación
□ Integro metabolismo con fisiología
`;

}

/* ================= RECOMENDACIONES ================= */

function buildRecommendations(){

let rec="";

["hito1","hito2","hito3","hito4"].forEach(h=>{

const score=getStars(h).reduce((a,b)=>a+b,0);

if(score===0){
rec+=`• Prioridad alta: reforzar ${h}\n`;
}

else if(score===1){
rec+=`• Prioridad media: consolidar ${h}\n`;
}

});

if(rec===""){
rec="Trayectoria sólida. Integrar conceptos entre rutas.";
}

return rec;

}

/* ================= PTORPEDO ================= */

function generatePTorpedoMarkdown(){

return`
# pTorpedo CAT3

Identidad: ${state.identity}

${identityPhrases[state.identity]}

---

${Object.keys(state.stars).map(h=>`
${h}: ${getStars(h).reduce((a,b)=>a+b,0)} ⭐
${summaries[h]}
`).join("")}

---

Resultado simulación:
${state.simScore ?? "No realizada"}

---

Recomendaciones:
${buildRecommendations()}

---

Checklist final:
${buildChecklist()}
`;

}

function renderPTorpedo(){

const report=generatePTorpedoMarkdown();

app.innerHTML=`
<div class="card">
<h2>pTorpedo</h2>
<textarea>${report}</textarea>
<br>
<button onclick="downloadPTorpedo()">Descargar Markdown</button>
<button onclick="renderRoute()">Volver a la ruta</button>
</div>
`;

}

function downloadPTorpedo(){

const blob=new Blob([generatePTorpedoMarkdown()],{type:"text/markdown"});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="pTorpedo_CAT3.md";

a.click();

}

/* ================= RESET ================= */

function resetProgress(){

localStorage.removeItem("pVANE_CAT3");
location.reload();

}

/* ================= INIT ================= */

if(state.identity){
renderRoute();
}else{
renderIdentitySelector();
}

</script>

</body>
</html>
